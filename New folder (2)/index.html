// ═══════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════
function render(){
  octx.clearRect(0,0,W,H);
  if(selT){octx.save();octx.strokeStyle='rgba(255,255,255,.32)';octx.fillStyle='rgba(255,255,255,.05)';octx.lineWidth=1.5;octx.setLineDash([6,4]);octx.beginPath();octx.arc(selT.x,selT.y,selT.range,0,Math.PI*2);octx.fill();octx.stroke();octx.restore();}
  // Glove mode UI
  if(gloveMode){
    octx.save();
    if(gloveSource){
      // Pulsing highlight on picked tower
      octx.globalAlpha=.45+Math.sin(Date.now()*.01)*.3;
      octx.strokeStyle='#f5c542';octx.lineWidth=3;octx.setLineDash([5,3]);
      octx.beginPath();octx.arc(gloveSource.x,gloveSource.y,TR+7,0,Math.PI*2);octx.stroke();
      // Ghost tower following cursor
      octx.globalAlpha=.45;
      const validDst=!onPathRaw(mp.x,mp.y)&&!towers.some(tt=>tt!==gloveSource&&d2(tt.x,tt.y,mp.x,mp.y)<TR*TR*4.2);
      drawMonkey(octx,mp.x,mp.y,gloveSource.type,TR,gloveSource.upgrades);
      octx.globalAlpha=.4;octx.strokeStyle=validDst?'rgba(100,255,100,.6)':'rgba(255,80,80,.6)';
      octx.lineWidth=1.5;octx.setLineDash([5,3]);
      octx.beginPath();octx.arc(mp.x,mp.y,gloveSource.range||120,0,Math.PI*2);octx.stroke();
    }
    // Top banner
    octx.globalAlpha=1;octx.setLineDash([]);
    octx.fillStyle='rgba(0,0,0,.5)';rr(octx,W*.5-140,8,280,26,6);octx.fill();
    octx.fillStyle='#f5c542';octx.font='bold 13px Nunito';octx.textAlign='center';octx.textBaseline='middle';
    octx.fillText(gloveSource?'✋ Click destination to move':'✋ Glove ON — click a monkey',W*.5,21);
    octx.restore();
  }
  if(placing){
    const def=TD[placing],px=mp.x,py=mp.y;
    const valid=!onPathRaw(px,py)&&!towerAt(px,py,-1)&&(def.wo?onLake(px,py):!onLake(px,py));
    octx.save();octx.globalAlpha=.5;drawMonkey(octx,px,py,placing,TR);octx.restore();
    octx.save();octx.strokeStyle=valid?'rgba(100,255,100,.5)':'rgba(255,80,80,.5)';octx.fillStyle=valid?'rgba(100,255,100,.07)':'rgba(255,80,80,.08)';octx.lineWidth=1.5;octx.setLineDash([6,4]);octx.beginPath();octx.arc(px,py,def.range||120,0,Math.PI*2);octx.fill();octx.stroke();octx.restore();
  }
  towers.forEach(t=>{
    const dx=t.isAce?(t._rx||t.x):t.isHeli?(t.heliX||t.x):t.x;
    const dy=t.isAce?(t._ry||t.y):t.isHeli?(t.heliY||t.y):t.y;
    if(t.isAce&&t.acePath==='circle'){octx.save();octx.strokeStyle='rgba(255,255,255,.1)';octx.lineWidth=1;octx.setLineDash([4,6]);octx.beginPath();octx.arc(t.aceX||t.x,t.aceY||t.y,80,0,Math.PI*2);octx.stroke();octx.restore();}
    if(t.disabledTimer>0){octx.save();octx.globalAlpha=.35+Math.sin(Date.now()*.012)*.25;octx.fillStyle='#ff2020';octx.beginPath();octx.arc(dx,dy,TR+5,0,Math.PI*2);octx.fill();octx.restore();}
    // Weaver spin during rune cast
    if(t.type==='weaver'&&t._spinning){
      octx.save();octx.translate(dx,dy);octx.rotate(t._spinAng||0);
      drawMonkey(octx,0,0,t.type,TR,t.upgrades);
      octx.restore();
    } else {
      drawMonkey(octx,dx,dy,t.type,TR,t.upgrades);
    }
    if(t.aaActive){octx.save();octx.strokeStyle='rgba(255,220,0,.8)';octx.lineWidth=2.5;const prog=1-(t.aaDur/(t.aaDurMax||10000));octx.beginPath();octx.arc(dx,dy,TR+5,-Math.PI*.5,-Math.PI*.5+Math.PI*2*prog);octx.stroke();octx.restore();}
    if(t.rotStars>0){
      const sr=32+t.rotStars*.4;
      for(let i=0;i<t.rotStars;i++){const a=(t._rotAng||0)+i*(Math.PI*2/t.rotStars),sx=t.x+Math.cos(a)*sr,sy=t.y+Math.sin(a)*sr;octx.save();octx.translate(sx,sy);octx.rotate(a*2);octx.fillStyle='#f5c542';octx.globalAlpha=.85;octx.beginPath();for(let j=0;j<5;j++){const a2=j*Math.PI*.4-Math.PI*.5,a3=a2+Math.PI*.2;j===0?octx.moveTo(Math.cos(a2)*5,Math.sin(a2)*5):octx.lineTo(Math.cos(a2)*5,Math.sin(a2)*5);octx.lineTo(Math.cos(a3)*2,Math.sin(a3)*2);}octx.closePath();octx.fill();octx.restore();}
      if(t.solarMax!==undefined){const pct=(t.solarCharge||0)/t.solarMax;octx.save();octx.fillStyle='rgba(0,0,0,.5)';octx.fillRect(t.x-20,t.y+TR+2,40,4);octx.fillStyle='#f5c542';octx.fillRect(t.x-20,t.y+TR+2,40*pct,4);octx.restore();}
    }
    if(t.runeCount>0){octx.save();octx.globalAlpha=.4;octx.strokeStyle='#d070ff';octx.lineWidth=1.5;octx.setLineDash([4,3]);octx.beginPath();octx.arc(t.x,t.y,t.range,0,Math.PI*2);octx.stroke();octx.restore();}
    // Cursed Monkey: CV aura pulse + perm HP cost indicator
    if(t.isCursed){
      octx.save();
      const pulse=.2+Math.sin(Date.now()*.008)*.15;
      octx.globalAlpha=pulse;octx.strokeStyle='#cc0044';octx.lineWidth=2;octx.setLineDash([3,4]);
      octx.beginPath();octx.arc(dx,dy,TR+8,0,Math.PI*2);octx.stroke();
      // Shared Burden range indicator (faint)
      if(t.sharedBurden){octx.globalAlpha=.1;octx.fillStyle='#cc0044';octx.beginPath();octx.arc(t.x,t.y,t.range,0,Math.PI*2);octx.fill();}
      octx.restore();
    }
  });
  planes.forEach(p=>{octx.save();octx.fillStyle='#f5a623';octx.beginPath();octx.arc(p.x,p.y,6,0,Math.PI*2);octx.fill();octx.strokeStyle='#fff';octx.lineWidth=1;octx.beginPath();octx.moveTo(p.x-8,p.y);octx.lineTo(p.x+8,p.y);octx.stroke();octx.beginPath();octx.moveTo(p.x,p.y-6);octx.lineTo(p.x,p.y+6);octx.stroke();octx.restore();});
  // Draw orbital orbs
  if(window._orbs){
    window._orbs.forEach(orb=>{
      if(!orb.x||!orb.y)return;
      const t=orb.tower;const pct=orb.maxLife===Infinity?1:orb.life/orb.maxLife;
      octx.save();
      // Outer glow
      const tier=Math.max(...(t.upgrades||[0,0,0]));
      const orbCol=tier>=4?'#ff6080':tier>=3?'#ff8040':tier>=2?'#40c8ff':tier>=1?'#60aaff':'#80c8ff';
      const glowG=octx.createRadialGradient(orb.x,orb.y,0,orb.x,orb.y,12);
      glowG.addColorStop(0,'rgba(128,200,255,.9)');glowG.addColorStop(.5,orbCol+'88');glowG.addColorStop(1,'rgba(40,60,200,0)');
      octx.fillStyle=glowG;octx.beginPath();octx.arc(orb.x,orb.y,12,0,Math.PI*2);octx.fill();
      // Core orb
      octx.fillStyle=orbCol;octx.beginPath();octx.arc(orb.x,orb.y,5.5,0,Math.PI*2);octx.fill();
      octx.fillStyle='rgba(255,255,255,.7)';octx.beginPath();octx.arc(orb.x-1.5,orb.y-1.5,2,0,Math.PI*2);octx.fill();
      // Life indicator ring (fades as orb expires)
      if(orb.maxLife!==Infinity&&pct<.5){octx.globalAlpha=.4;octx.strokeStyle='#f88';octx.lineWidth=1.5;octx.beginPath();octx.arc(orb.x,orb.y,7,0,Math.PI*2*pct);octx.stroke();}
      // Orbit trail line back to tower
      octx.globalAlpha=.08;octx.strokeStyle=orbCol;octx.lineWidth=1;
      octx.beginPath();octx.moveTo(t.x,t.y);octx.lineTo(orb.x,orb.y);octx.stroke();
      octx.restore();
    });
    // Standby orbs (halo style)
    towers.filter(t=>t.isOrbital&&t._standbyOrbs).forEach(t=>{
      t._standbyOrbs.filter(s=>!s.dead).forEach(s=>{
        octx.save();
        octx.fillStyle='rgba(255,220,80,.85)';octx.beginPath();octx.arc(s.x,s.y,7,0,Math.PI*2);octx.fill();
        octx.fillStyle='rgba(255,255,255,.6)';octx.beginPath();octx.arc(s.x-2,s.y-2,2.5,0,Math.PI*2);octx.fill();
        octx.restore();
      });
    });
  }
  // Draw spikes on path
  spikes.forEach(s=>{
    const pos=pathPos(s.dist);
    const x=pos.x,y=pos.y;
    octx.save();
    if(s.isLandmine){
      // Landmine: dark circle with X
      octx.fillStyle='#2a1a00';octx.beginPath();octx.arc(x,y,7,0,Math.PI*2);octx.fill();
      octx.strokeStyle='#f5a623';octx.lineWidth=1.5;
      octx.beginPath();octx.moveTo(x-4,y-4);octx.lineTo(x+4,y+4);octx.stroke();
      octx.beginPath();octx.moveTo(x+4,y-4);octx.lineTo(x-4,y+4);octx.stroke();
      octx.strokeStyle='rgba(255,80,0,.4)';octx.lineWidth=1;octx.beginPath();octx.arc(x,y,9,0,Math.PI*2);octx.stroke();
    } else if(s.stickyBomb&&s._stuck){
      // Stuck sticky bomb pulsing
      const pulse=.7+Math.sin(Date.now()*.008)*0.3;
      octx.globalAlpha=pulse;octx.fillStyle='#ff4400';octx.beginPath();octx.arc(x,y,7,0,Math.PI*2);octx.fill();
      octx.fillStyle='#ffcc00';octx.beginPath();octx.arc(x,y,3,0,Math.PI*2);octx.fill();
    } else {
      // Normal spike — metal grey spike shape
      octx.fillStyle=s.hotSpikes?'#ff6622':(s.eternal?'#c0e0ff':'#c8c8c8');
      octx.beginPath();
      octx.moveTo(x,y-7);octx.lineTo(x+3,y+2);octx.lineTo(x+1,y+2);
      octx.lineTo(x+1,y+7);octx.lineTo(x-1,y+7);octx.lineTo(x-1,y+2);
      octx.lineTo(x-3,y+2);octx.closePath();octx.fill();
      octx.strokeStyle='rgba(0,0,0,.3)';octx.lineWidth=.8;octx.stroke();
      if(s.hotSpikes){octx.globalAlpha=.4;octx.fillStyle='#ff4400';octx.beginPath();octx.arc(x,y-5,3,0,Math.PI*2);octx.fill();}
    }
    // Pierce count badge if >1
    if(s.pierce>1){
      octx.globalAlpha=1;octx.fillStyle='rgba(0,0,0,.6)';rr(octx,x+4,y-10,12,8,3);octx.fill();
      octx.fillStyle='#fff';octx.font='6px Nunito';octx.textAlign='center';octx.textBaseline='middle';
      octx.fillText(s.pierce,x+10,y-6);
    }
    octx.restore();
  });
  bloons.forEach(b=>drawBloon(octx,b));
  // Projectiles — respect visualMode
  if(showProj&&visualMode!=='none'){
    const projList=visualMode==='low'?projs.slice(-400):projs;
    projList.forEach(p=>{
      if(p.type==='ice'||p.type==='glue')return;
      octx.save();
      const tgt=bloons.find(b=>b.id===p.tid);
      const ang=tgt?Math.atan2(tgt.y-p.y,tgt.x-p.x):0;
      octx.translate(p.x,p.y);
      switch(p.type){
        case'dart':octx.rotate(ang);octx.fillStyle='#ddd';octx.beginPath();octx.moveTo(8,0);octx.lineTo(-4,3);octx.lineTo(-4,-3);octx.closePath();octx.fill();if(visualMode==='normal'){octx.strokeStyle='rgba(200,200,200,.4)';octx.lineWidth=1.5;octx.beginPath();octx.moveTo(-4,0);octx.lineTo(-10,0);octx.stroke();}break;
        case'boomerang':octx.rotate(ang+p.id*.05);octx.strokeStyle='#c8a040';octx.lineWidth=4;octx.lineCap='round';octx.beginPath();octx.arc(0,0,8,-Math.PI*.6,Math.PI*.1);octx.stroke();break;
        case'pirate':octx.fillStyle='#aaa';octx.beginPath();octx.arc(0,0,5,0,Math.PI*2);octx.fill();break;
        case'wizard':octx.fillStyle='#d070ff';octx.beginPath();octx.arc(0,0,5,0,Math.PI*2);octx.fill();break;
        case'caveman':octx.rotate(ang+p.id*.08);octx.fillStyle='#997755';octx.beginPath();octx.ellipse(0,0,7,5,.3,0,Math.PI*2);octx.fill();break;
        case'ninja':octx.rotate(ang+p.id*.15);octx.fillStyle='#ccc';octx.beginPath();octx.moveTo(0,-6);octx.lineTo(2,-2);octx.lineTo(6,0);octx.lineTo(2,2);octx.lineTo(0,6);octx.lineTo(-2,2);octx.lineTo(-6,0);octx.lineTo(-2,-2);octx.closePath();octx.fill();break;
        case'sniper':octx.fillStyle='#ffee00';octx.beginPath();octx.ellipse(0,0,5,2,0,0,Math.PI*2);octx.fill();if(tgt&&visualMode==='normal'){octx.resetTransform();const lg=octx.createLinearGradient(p.x,p.y,tgt.x,tgt.y);lg.addColorStop(0,'rgba(255,220,0,.8)');lg.addColorStop(1,'rgba(255,220,0,0)');octx.strokeStyle=lg;octx.lineWidth=2;octx.beginPath();octx.moveTo(p.x,p.y);octx.lineTo(tgt.x,tgt.y);octx.stroke();}break;
        case'tack':octx.strokeStyle='#bbb';octx.lineWidth=3;octx.lineCap='round';octx.beginPath();octx.moveTo(-5,0);octx.lineTo(5,0);octx.stroke();octx.beginPath();octx.moveTo(0,-5);octx.lineTo(0,5);octx.stroke();break;
        case'ace':case'heli':octx.rotate(ang);octx.fillStyle=p.type==='ace'?'#80c8ff':'#a8d8ff';octx.beginPath();octx.moveTo(6,0);octx.lineTo(-3,2.5);octx.lineTo(-3,-2.5);octx.closePath();octx.fill();break;
        case'sub':octx.rotate(ang);octx.fillStyle='#40a8d0';octx.beginPath();octx.ellipse(0,0,7,3,0,0,Math.PI*2);octx.fill();break;
        case'nail':octx.fillStyle='#cc80ff';octx.beginPath();octx.arc(0,0,5,0,Math.PI*2);octx.fill();break;
        case'sentry_star':octx.rotate(p.id*.12);octx.fillStyle='#f5c542';octx.beginPath();for(let j=0;j<5;j++){const a2=j*Math.PI*.4-Math.PI*.5,a3=a2+Math.PI*.2;j===0?octx.moveTo(Math.cos(a2)*7,Math.sin(a2)*7):octx.lineTo(Math.cos(a2)*7,Math.sin(a2)*7);octx.lineTo(Math.cos(a3)*3,Math.sin(a3)*3);}octx.closePath();octx.fill();break;
        default:octx.fillStyle='#fff';octx.beginPath();octx.arc(0,0,3,0,Math.PI*2);octx.fill();
      }
      octx.restore();
    });
  }
  // Particles — skip in none, batch-draw with single save/restore
  if(visualMode!=='none'&&parts.length>0){
    octx.save();
    parts.forEach(p=>{octx.globalAlpha=p.life/p.maxLife;octx.fillStyle=p.col;octx.beginPath();octx.arc(p.x,p.y,p.r,0,Math.PI*2);octx.fill();});
    octx.restore();
  }
  octx.save();octx.fillStyle='rgba(255,255,255,.2)';octx.font='10px Nunito';octx.textAlign='right';
  octx.fillText(`[P] Proj: ${visualMode==='none'?'NONE':showProj?'ON':'OFF'}`,W-8,H-6);
  octx.fillText(`[2] Glove: ${gloveMode?'ON ✋':'OFF'}`,W-8,H-18);
  octx.restore();
  // CV bar overlay (top-left corner, shown when any CV exists)
  if(cvTotal()>0||sacrificialRiteActive){
    const cvTot=cvTotal(),maxCV=Math.max(cvTot,30);
    octx.save();
    octx.fillStyle='rgba(0,0,0,.55)';rr(octx,8,8,160,22,5);octx.fill();
    // Perm bar (dark red)
    octx.fillStyle='#660022';rr(octx,10,10,156,8,3);octx.fill();
    octx.fillStyle='#cc0044';rr(octx,10,10,156*(permLives/150),8,3);octx.fill();
    // CV bar (bright)
    octx.fillStyle='rgba(255,80,120,.25)';rr(octx,10,20,156,8,3);octx.fill();
    octx.fillStyle='#ff4488';rr(octx,10,20,Math.min(156,156*(cvTot/maxCV)),8,3);octx.fill();
    octx.fillStyle='#fff';octx.font='bold 8px Nunito';octx.textAlign='left';octx.textBaseline='middle';
    octx.fillText(`❤️ ${permLives} perm`,13,14);
    octx.fillText(`✝ CV: ${cvTot.toFixed(1)} (${20}s)`,13,24);
    if(sacrificialRiteActive){octx.fillStyle='rgba(200,0,60,.7)';rr(octx,8,8,160,22,5);octx.stroke();octx.fillStyle='#ff4488';octx.font='bold 9px Nunito';octx.textAlign='center';octx.fillText('⚗️ SACRIFICIAL RITE',88,19);}
    octx.restore();
  }
}

function towerAt(x,y,exId){return towers.some(t=>t.id!==exId&&d2(t.x,t.y,x,y)<TR*TR*4.2);}

// SELECTION & UPGRADES
// ═══════════════════════════════════════════════════════
function selTower(id){selT=towers.find(t=>t.id===id)||null;renderRight();}
function renderRight(){
  document.getElementById('nosel').style.display=selT?'none':'';
  document.getElementById('selpanel').style.display=selT?'block':'none';
  if(!selT)return;
  const t=selT,def=TD[t.type];
  const sc=document.getElementById('selcv'),sctx=sc.getContext('2d');
  sctx.clearRect(0,0,44,44);drawMonkey(sctx,22,26,t.type,18,t.upgrades);
  document.getElementById('selnm').textContent=def.name;
  document.getElementById('selst').textContent=`${t.upgrades.join('-')} | $${t.totalSpent}`;
  const sv=Math.round(t.totalSpent*.5*(1+(t.sellBonus||0)));
  document.getElementById('sellbtn').textContent=`💰 Sell ($${sv})`;
  const cont=document.getElementById('ulanes');cont.innerHTML='';
  const lc=['#f5c542','#3498db','#2ecc71'],ln=['Path 1','Path 2','Path 3'];
  const upgs=t.upgrades,fullPath=upgs.findIndex(u=>u>=3);
  const disc=Math.min(.3,getDisc());
  def.upgrades.forEach((lane,li)=>{
    const ld=document.createElement('div');ld.className='ul';
    ld.innerHTML=`<div class="uln" style="color:${lc[li]}">${ln[li]}</div>`;
    lane.forEach((upg,ui)=>{
      const btn=document.createElement('button');btn.className='ub';
      const purchased=upgs[li]>ui,isCur=upgs[li]===ui;
      const locked=fullPath!==-1&&li!==fullPath&&ui>=2&&!purchased;
      const cost=Math.round(upg.cost*(1-disc));
      if(purchased){btn.className+=' done';btn.innerHTML=`✓ ${upg.name}<span class="ud">${upg.desc}</span>`;btn.disabled=true;}
      else if(locked){btn.className+=' lkd';btn.innerHTML=`🔒 ${upg.name}`;btn.disabled=true;}
      else if(!isCur){btn.innerHTML=`${upg.name}<span class="uc">$${cost}</span>`;btn.disabled=true;}
      else{btn.innerHTML=`⬆ ${upg.name}<span class="uc">$${cost}</span><span class="ud">${upg.desc}</span>`;btn.disabled=money<cost;btn.onclick=()=>buyUpg(t.id,li,ui,cost,upg);}
      ld.appendChild(btn);
    });
    cont.appendChild(ld);
  });
}
function buyUpg(tid,li,ui,cost,upg){
  const t=towers.find(tt=>tt.id===tid);if(!t)return;if(money<cost)return;
  money-=cost;t.totalSpent+=cost;t.upgrades[li]++;upg.fx(t);updUI();renderRight();
  showFlt(t.x,t.y-28,`⬆ ${upg.name}`,'#2ecc71');
}
function sellSel(){
  if(!selT)return;
  const v=Math.round(selT.totalSpent*.5*(1+(selT.sellBonus||0)));
  money+=v;towers=towers.filter(t=>t.id!==selT.id);planes=planes.filter(p=>p.tower.id!==selT.id);
  selT=null;updUI();renderRight();
}

function buildShopUI(){
  const shop=document.getElementById('shop');shop.innerHTML='<h3>MONKEYS</h3>';
  Object.entries(TD).forEach(([type,def])=>{
    const card=document.createElement('div');card.className='sc';card.id='sc-'+type;
    const cv=document.createElement('canvas');cv.width=56;cv.height=56;
    drawMonkey(cv.getContext('2d'),28,36,type,20);
    card.appendChild(cv);
    const nm=document.createElement('div');nm.className='nm';nm.textContent=def.name;
    const pr=document.createElement('div');pr.className='pr';pr.id='pr-'+type;pr.textContent='$'+def.cost;
    card.appendChild(nm);card.appendChild(pr);
    if(def.wo){const wl=document.createElement('div');wl.className='wt';wl.textContent='💧 Water';card.appendChild(wl);}
    card.addEventListener('click',()=>togglePlace(type));
    shop.appendChild(card);
  });
}
function togglePlace(type){
  if(placing===type){placing=null;document.querySelectorAll('.sc').forEach(c=>c.classList.remove('sel'));return;}
  placing=type;selT=null;renderRight();
  document.querySelectorAll('.sc').forEach(c=>c.classList.remove('sel'));
  document.getElementById('sc-'+type).classList.add('sel');
}

// ═══════════════════════════════════════════════════════
// EVENTS
// ═══════════════════════════════════════════════════════
function setupEvents(){
  mc.addEventListener('click',e=>{
    const r=mc.getBoundingClientRect(),x=e.clientX-r.left,y=e.clientY-r.top;
    if(placing){placeTower(placing,x,y);return;}
    // Glove mode: first click picks tower, second click moves it
    if(gloveMode){
      if(!gloveSource){
        const hit=towers.find(t=>d2(t.x,t.y,x,y)<TR*TR*2.2);
        if(hit){gloveSource=hit;showFlt(x,y,'✋ Pick where?','#f5c542');}
      } else {
        // Move the tower to new location
        const t=gloveSource;
        if(onPathRaw(x,y)){showFlt(x,y,"Can't place on path!",'#e74c3c');return;}
        if(towers.some(tt=>tt!==t&&d2(tt.x,tt.y,x,y)<TR*TR*4.2)){showFlt(x,y,'Overlapping!','#e74c3c');return;}
        if(TD[t.type].wo&&!onLake(x,y)){showFlt(x,y,'Water only! 🌊','#3498db');return;}
        if(!TD[t.type].wo&&onLake(x,y)){showFlt(x,y,"Can't place on water!",'#3498db');return;}
        t.x=x;t.y=y;
        // Reset ace/heli position
        if(t.isAce){t.aceX=x;t.aceY=y;}
        if(t.isHeli){t.heliX=x;t.heliY=y;}
        // Reset orbital orbs for this tower
        if(window._orbs)window._orbs=window._orbs.filter(o=>o.tower!==t);
        showFlt(x,y,'✋ Moved!','#f5c542');
        gloveSource=null;gloveMode=false;
        mc.style.cursor='crosshair';
      }
      return;
    }
    const hit=towers.find(t=>{const tx=t.isAce?(t._rx||t.x):t.isHeli?(t.heliX||t.x):t.x,ty=t.isAce?(t._ry||t.y):t.isHeli?(t.heliY||t.y):t.y;return d2(tx,ty,x,y)<TR*TR*1.8;})||towers.find(t=>d2(t.x,t.y,x,y)<TR*TR*1.8);
    if(hit)selTower(hit.id);else{selT=null;renderRight();}
  });
  mc.addEventListener('mousemove',e=>{const r=mc.getBoundingClientRect();mp={x:e.clientX-r.left,y:e.clientY-r.top};});
  mc.addEventListener('contextmenu',e=>{
    e.preventDefault();
    placing=null;document.querySelectorAll('.sc').forEach(c=>c.classList.remove('sel'));
    if(gloveMode){gloveMode=false;gloveSource=null;mc.style.cursor='crosshair';showFlt(mp.x,mp.y,'✋ Cancelled','#aaa');}
  });
  window.addEventListener('resize',()=>resize());
  window.addEventListener('keydown',e=>{
    if(e.key==='Escape'){
      placing=null;document.querySelectorAll('.sc').forEach(c=>c.classList.remove('sel'));
      gloveMode=false;gloveSource=null;mc.style.cursor='crosshair';
    }
    if(e.key==='2'){
      gloveMode=!gloveMode;gloveSource=null;
      mc.style.cursor=gloveMode?'grab':'crosshair';
      showFlt(W*.5,H*.5,gloveMode?'✋ Glove ON — click tower then destination':'✋ Glove OFF','#f5c542');
    }
    if(e.key==='p'||e.key==='P'){showProj=!showProj;showFlt(W*.5,H*.5,showProj?'Projectiles ON':'Projectiles OFF','#f5c542');}
  });
}

// WAVE / GAME CONTROL
// ═══════════════════════════════════════════════════════
function sendWave(){
  if(waveActive)return;
  waveNum++;document.getElementById('tbw').textContent=waveNum;
  spawnQ=genWave(waveNum);spawnI=0;spawnTm=0;waveActive=true;
  document.getElementById('sendbtn').textContent='🌊 In Progress...';
  document.getElementById('sendbtn').disabled=true;
}
function cycleSpeed(){gameSpeed=gameSpeed===1?2:gameSpeed===2?3:1;document.getElementById('speed-ind').textContent=gameSpeed+'×';}
function gameOver(){gameRunning=false;document.getElementById('ovwave').textContent=waveNum;document.getElementById('overscr').style.display='flex';}
function updUI(){
  document.getElementById('tbm').textContent=money;
  document.getElementById('tbl').textContent=Math.max(0,lives);
  const disc=Math.min(.3,getDisc());
  Object.entries(TD).forEach(([type,def])=>{
    const card=document.getElementById('sc-'+type);if(!card)return;
    const cost=Math.round(def.cost*(1-disc));
    const pr=document.getElementById('pr-'+type);if(pr)pr.textContent='$'+cost;
    card.classList.toggle('na',money<cost);
  });
  if(selT)renderRight();
}

// ═══════════════════════════════════════════════════════
// SETTINGS FUNCTIONS
// ═══════════════════════════════════════════════════════
function toggleSettings(){
  document.getElementById('settingsModal').classList.toggle('open');
}
function setVisuals(mode){
  visualMode=mode;
  ['none','low','normal'].forEach(m=>{
    const el=document.getElementById('vis-'+m);
    if(el)el.classList.toggle('active',m===mode);
  });
  if(mode==='none')showProj=false;
  else showProj=true;
}
function setFrameCap(val){
  const v=parseInt(val);
  frameCap=v>0?Math.round(1000/v):0;
}
function setPerfMode(on){
  perfMode=on;
  document.getElementById('perf-on').classList.toggle('active',on);
  document.getElementById('perf-off').classList.toggle('active',!on);
  if(on){
    setVisuals('none');
    document.getElementById('fpsCapSel').value='60';
    setFrameCap(60);
    // also force low particle count
    showProj=false;
  }
}
function setPingDisplay(on){
  showPing=on;
  document.getElementById('ping-on').classList.toggle('active',on);
  document.getElementById('ping-off').classList.toggle('active',!on);
  const bar=document.getElementById('perfBar');
  if(bar)bar.style.display=on?'block':'none';
}

// ─── CODES ───
const CODE_DEFS={
  'WEAVERMONKEY':{once:true,fn:()=>{money+=2000;updUI();return'+$2000 gold 🍌';}},
  'COSTCO':      {once:true,fn:()=>{money+=2500;updUI();return'+$2500 gold 🛒';}},
  'HEALTHPLS':   {once:true,fn:()=>{permLives=Math.min(permLives+100,999);lives=permLives+cvTotal();updUI();document.getElementById('tbl').textContent=lives;return'+100 Health ❤️';}},
  'DEATH':       {once:true,fn:()=>{deathMod=true;bloons.forEach(b=>{b.hp=Math.ceil(b.hp*1.5);b.maxHp=b.hp;b.speed*=1.25;});return'☠️ DEATH MODE — Bloons 1.5× HP, 1.25× Speed!';}},
};
function redeemCode(){
  const raw=document.getElementById('codeInput').value.trim().toUpperCase();
  const msg=document.getElementById('codeMsg');
  if(!raw){msg.style.color='#e74c3c';msg.textContent='Enter a code first.';return;}
  if(CODES_USED.has(raw)){msg.style.color='#e74c3c';msg.textContent='Already used this code!';return;}
  const def=CODE_DEFS[raw];
  if(!def){msg.style.color='#e74c3c';msg.textContent='Unknown code.';return;}
  CODES_USED.add(raw);
  const result=def.fn();
  msg.style.color='#f5c542';msg.textContent='✓ '+result;
  document.getElementById('codeInput').value='';
  setTimeout(()=>{if(msg)msg.textContent='';},3000);
}

window.startGame=startGame;window.sendWave=sendWave;window.cycleSpeed=cycleSpeed;window.sellSel=sellSel;
window.toggleSettings=toggleSettings;window.setVisuals=setVisuals;window.setFrameCap=setFrameCap;
window.setPerfMode=setPerfMode;window.setPingDisplay=setPingDisplay;window.redeemCode=redeemCode;
</script>
</body>

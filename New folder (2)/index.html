<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Monkeys vs Bloons</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Lilita+One&family=Nunito:wght@400;700;800;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{--gold:#f5c542;--gold2:#e8a800;--panel:#2c1f0e;--panel2:#3a2a12;--panel3:#4a3520;--border:#6b4c1e;--text:#fff8e7;--sub:#c9a96e}
body{background:#1a2e0d;font-family:'Nunito',sans-serif;overflow:hidden;width:100vw;height:100vh;display:flex;flex-direction:column;user-select:none}
#topbar{height:50px;background:linear-gradient(180deg,var(--panel),var(--panel2));border-bottom:3px solid var(--border);display:flex;align-items:center;gap:8px;padding:0 10px;box-shadow:0 4px 12px rgba(0,0,0,.5);flex-shrink:0}
.chip{display:flex;align-items:center;gap:4px;background:rgba(0,0,0,.3);border:2px solid var(--border);border-radius:9px;padding:3px 8px;font-family:'Lilita One',cursive;font-size:14px;color:var(--gold);white-space:nowrap}
.chip .lbl{font-size:9px;color:var(--sub);font-family:'Nunito',sans-serif;font-weight:800}
.spacer{flex:1}
.tbtn{background:linear-gradient(180deg,#e8a800,#c47a00);border:2px solid #a06200;color:#3a1a00;font-family:'Lilita One',cursive;font-size:12px;padding:4px 10px;border-radius:9px;cursor:pointer;box-shadow:0 3px 0 #7a4400;transition:transform .1s}
.tbtn:hover{transform:translateY(-1px)}.tbtn:active{transform:translateY(1px)}
.tbtn.green{background:linear-gradient(180deg,#27ae60,#1e8449);border-color:#17693a;color:#fff;box-shadow:0 3px 0 #0e5229}
#speed-ind{font-size:11px;color:var(--sub);font-weight:800}
#main{display:flex;flex:1;overflow:hidden}
#shop{width:112px;background:linear-gradient(180deg,var(--panel),var(--panel2));border-right:3px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;flex-shrink:0;padding:4px;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
#shop h3{font-family:'Lilita One',cursive;color:var(--gold);font-size:11px;text-align:center;margin-bottom:3px}
.sc{background:linear-gradient(180deg,var(--panel2),var(--panel3));border:2px solid var(--border);border-radius:8px;padding:3px;margin-bottom:3px;cursor:pointer;text-align:center;transition:border-color .15s,transform .1s}
.sc:hover{border-color:var(--gold);transform:translateY(-1px)}.sc.sel{border-color:var(--gold);box-shadow:0 0 0 2px var(--gold)}
.sc.na{opacity:.4;filter:grayscale(.5);cursor:not-allowed}
.sc canvas{display:block;margin:0 auto 1px}.sc .nm{font-size:8.5px;font-weight:800;color:var(--text);line-height:1.1}.sc .pr{font-family:'Lilita One',cursive;font-size:10px;color:var(--gold)}.sc .wt{font-size:7.5px;color:#5bc8f5;font-weight:700}
#mapwrap{flex:1;position:relative;overflow:hidden}
#mc{display:block;cursor:crosshair}#oc{position:absolute;top:0;left:0;pointer-events:none}
#rp{width:168px;background:linear-gradient(180deg,var(--panel),var(--panel2));border-left:3px solid var(--border);display:flex;flex-direction:column;padding:5px 4px;gap:3px;overflow-y:auto;flex-shrink:0;scrollbar-width:thin}
#rp h3{font-family:'Lilita One',cursive;color:var(--gold);font-size:12px;text-align:center}
#nosel{color:var(--sub);font-size:10px;text-align:center;margin-top:5px}
#selpanel{display:none}
#selport{display:flex;align-items:center;gap:4px;margin-bottom:3px}
#selport canvas{border-radius:5px;background:rgba(0,0,0,.3);border:2px solid var(--border)}
#selnm{font-family:'Lilita One',cursive;color:var(--gold);font-size:11px}#selst{font-size:8px;color:var(--sub);font-weight:700}
#sellbtn{background:linear-gradient(180deg,#c0392b,#922b21);border:2px solid #7b241c;color:#fff;font-family:'Lilita One',cursive;font-size:11px;padding:4px;border-radius:6px;cursor:pointer;box-shadow:0 2px 0 #5a1a14}
#sellbtn:hover{opacity:.85}
.ul{background:rgba(0,0,0,.2);border:1px solid var(--border);border-radius:5px;padding:3px;margin-bottom:2px}
.uln{font-size:7.5px;font-weight:900;text-transform:uppercase;letter-spacing:.4px;margin-bottom:1px}
.ub{width:100%;background:linear-gradient(180deg,var(--panel2),var(--panel3));border:1px solid var(--border);color:var(--text);font-family:'Nunito',sans-serif;font-weight:800;font-size:7.5px;border-radius:4px;padding:2px 3px;cursor:pointer;text-align:left;margin-bottom:1px;line-height:1.3;transition:border-color .12s}
.ub:hover:not(:disabled){border-color:var(--gold)}.ub:disabled{opacity:.32;cursor:not-allowed}
.ub.done{background:rgba(39,174,96,.12);border-color:#27ae60;color:#27ae60}.ub.lkd{opacity:.15;cursor:not-allowed}
.uc{color:var(--gold);font-size:7px;display:block}.ud{color:#888;font-size:7px;display:block}
/* Settings Modal */
#settingsModal{position:fixed;inset:0;background:rgba(0,0,0,.78);display:none;align-items:center;justify-content:center;z-index:998;backdrop-filter:blur(5px)}

#settingsBox{background:linear-gradient(160deg,var(--panel),var(--panel2));border:3px solid var(--border);border-radius:16px;padding:22px 28px;width:430px;max-width:96vw;box-shadow:0 20px 60px rgba(0,0,0,.85)}
#settingsBox h2{font-family:'Lilita One',cursive;color:var(--gold);font-size:18px;margin-bottom:16px;text-align:center;letter-spacing:.5px}
.srow{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;gap:10px}
.srow label{font-size:11px;font-weight:800;color:var(--text);flex:1}
.srow .sdesc{font-size:8.5px;color:var(--sub);display:block;margin-top:1px}

.sopt.active{background:var(--gold);border-color:var(--gold2);color:#3a1a00}
.sopt:hover:not(.active){border-color:var(--gold);color:var(--text)}
.sselect{background:rgba(0,0,0,.4);border:1.5px solid var(--border);color:var(--text);font-family:'Nunito',sans-serif;font-weight:700;font-size:10px;padding:3px 6px;border-radius:6px;cursor:pointer}

.scode-wrap{display:flex;gap:5px;margin-top:4px}
#codeInput{flex:1;background:rgba(0,0,0,.4);border:1.5px solid var(--border);color:var(--gold);font-family:'Nunito',sans-serif;font-weight:700;font-size:11px;padding:4px 8px;border-radius:6px;outline:none;text-transform:uppercase}
#codeInput::placeholder{color:var(--sub);text-transform:none}
#codeInput:focus{border-color:var(--gold)}
#codeSubmit{background:linear-gradient(180deg,#e8a800,#c47a00);border:1.5px solid #a06200;color:#3a1a00;font-family:'Lilita One',cursive;font-size:11px;padding:4px 12px;border-radius:6px;cursor:pointer}
#codeMsg{font-size:9px;margin-top:4px;height:12px;font-weight:800}
.sclose{background:none;border:1.5px solid var(--border);color:var(--sub);font-size:13px;padding:4px 12px;border-radius:7px;cursor:pointer;float:right;margin-top:10px;font-family:'Nunito',sans-serif;font-weight:800}
.sclose:hover{border-color:var(--gold);color:var(--text)}
#perfBar{position:fixed;bottom:6px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.7);border:1px solid var(--border);border-radius:8px;padding:2px 10px;font-family:'Nunito',sans-serif;font-size:10px;color:#a8f0a8;font-weight:800;pointer-events:none;z-index:90;display:none;white-space:nowrap}
.screen{position:fixed;inset:0;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;z-index:999;backdrop-filter:blur(6px)}
.sbox{background:linear-gradient(160deg,var(--panel),var(--panel2));border:3px solid var(--border);border-radius:18px;padding:36px 52px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.8)}
.sbox h1{font-family:'Lilita One',cursive;font-size:44px;color:var(--gold);margin-bottom:6px}
.sbox p{color:var(--sub);font-size:13px;margin-bottom:22px}
.sbtn{background:linear-gradient(180deg,var(--gold),var(--gold2));border:2px solid #a06200;color:#3a1a00;font-family:'Lilita One',cursive;font-size:18px;padding:10px 38px;border-radius:11px;cursor:pointer;box-shadow:0 5px 0 #7a4400;transition:transform .1s}
.sbtn:hover{transform:translateY(-2px)}
.flt{position:absolute;pointer-events:none;font-family:'Lilita One',cursive;font-size:13px;animation:fA .9s ease-out forwards;transform:translate(-50%,-50%);z-index:80;text-shadow:0 1px 4px rgba(0,0,0,.7)}
@keyframes fA{0%{opacity:1;transform:translate(-50%,-50%)}100%{opacity:0;transform:translate(-50%,-160%)}}
</style>
</head>
<body>
<div class="screen" id="startscr"><div class="sbox"><h1>🐒 Monkeys vs Bloons</h1><p>Random map every game. Pop every bloon!</p><button class="sbtn" onclick="startGame()">▶ Play</button></div></div>
<div class="screen" id="overscr" style="display:none"><div class="sbox"><h1 style="color:#e74c3c">💀 Defeated!</h1><p>You survived <strong id="ovwave">0</strong> waves</p><button class="sbtn" onclick="location.reload()">↺ Retry</button></div></div>

<!-- SETTINGS MODAL -->
<div id="settingsModal" onclick="if(event.target===this)toggleSettings()">
  <div id="settingsBox">
    <h2>⚙️ Settings</h2>
    <!-- Visuals -->
    <div class="srow">
      <label>🎨 Visuals<span class="sdesc">Projectile & particle quality</span></label>
      <div class="sbtngroup">
        <button class="sopt" id="vis-none" onclick="setVisuals('none')">None</button>
        <button class="sopt" id="vis-low" onclick="setVisuals('low')">Low</button>
        <button class="sopt active" id="vis-normal" onclick="setVisuals('normal')">Normal</button>
      </div>
    </div>
    <!-- Frame Cap -->
    <div class="srow">
      <label>🖥️ Frame Cap<span class="sdesc">Maximum frames per second</span></label>
      <select class="sselect" id="fpsCapSel" onchange="setFrameCap(this.value)">
        <option value="30">30 FPS</option>
        <option value="60">60 FPS</option>
        <option value="90">90 FPS</option>
        <option value="0" selected>Infinite</option>
      </select>
    </div>
    <!-- Better Performance -->
    <div class="srow">
      <label>⚡ Better Performance<span class="sdesc">Visuals→None, cap 60fps, reduces lag</span></label>
      <div class="sbtngroup">
        <button class="sopt" id="perf-on" onclick="setPerfMode(true)">ON</button>
        <button class="sopt active" id="perf-off" onclick="setPerfMode(false)">OFF</button>
      </div>
    </div>
    <!-- Ping/FPS display -->
    <div class="srow">
      <label>📊 Show FPS / Ping<span class="sdesc">Displays FPS, frame time, and lag estimate</span></label>
      <div class="sbtngroup">
        <button class="sopt" id="ping-on" onclick="setPingDisplay(true)">ON</button>
        <button class="sopt active" id="ping-off" onclick="setPingDisplay(false)">OFF</button>
      </div>
    </div>
    <!-- Codes -->
    <div>
      <label style="font-size:11px;font-weight:800;color:var(--text)">🔑 Redeem Code<span class="sdesc" style="display:block;font-size:8.5px;color:var(--sub);margin-top:1px">One-time use per game</span></label>
      <div class="scode-wrap">
        <input id="codeInput" placeholder="Enter code..." maxlength="24" onkeydown="if(event.key==='Enter')redeemCode()">
        <button id="codeSubmit" onclick="redeemCode()">▶ Use</button>
      </div>
      <div id="codeMsg" style="color:var(--gold)"></div>
    </div>
    <button class="sclose" onclick="toggleSettings()">✕ Close</button>
  </div>
</div>

<!-- PERFORMANCE BAR -->
<div id="perfBar">FPS: -- | Frame: --ms | Lag: --ms</div>

<div id="topbar">
  <div class="chip"><span class="lbl">💰</span><span id="tbm">650</span></div>
  <div class="chip"><span class="lbl">❤️</span><span id="tbl">150</span></div>
  <div class="chip"><span class="lbl">🌊</span><span id="tbw">0</span></div>
  <div class="spacer"></div>
  <span id="speed-ind">1×</span>
  <button class="tbtn" onclick="cycleSpeed()">⏩ Speed</button>
  <button class="tbtn" onclick="toggleSettings()" style="background:linear-gradient(180deg,#3a5a8a,#2a3a6a);border-color:#4a6aaa;color:#a8d0ff">⚙️</button>
  <button class="tbtn green" id="sendbtn" onclick="sendWave()">⚡ Send Wave</button>
</div>
<div id="main">
  <div id="shop"><h3>MONKEYS</h3></div>
  <div id="mapwrap"><canvas id="mc"></canvas><canvas id="oc"></canvas></div>
  <div id="rp"><h3>TOWER INFO</h3><div id="nosel">Click a monkey<br>to manage it</div>
    <div id="selpanel">
      <div id="selport"><canvas id="selcv" width="44" height="44"></canvas><div><div id="selnm"></div><div id="selst"></div></div></div>
      <div id="ulanes"></div>
      <button id="sellbtn" onclick="sellSel()">💰 Sell</button>
    </div>
  </div>
</div>
<script>
// ═══════════════════════════════════════════════════════
// CORE STATE
// ═══════════════════════════════════════════════════════
const TR=22;
let W=0,H=0,money=650,lives=150,waveNum=0,gameSpeed=1,gameRunning=false,lastTs=0;
let towers=[],bloons=[],projs=[],parts=[],planes=[],spikes=[];
let hypnoBloons=[]; // {id,bloonRef,tower,x,y,dist,dir,hp,maxHp,dmg,atkCd,_atkTm,magnetized,rotsDone,dead}
let nid=1,selT=null,placing=null,mp={x:0,y:0};
let waveActive=false,spawnQ=[],spawnI=0,spawnTm=0,showProj=true;
// Settings state
let visualMode='normal'; // 'none' | 'low' | 'normal'
let frameCap=0;          // 0 = infinite, else ms per frame minimum
let perfMode=false;
let showPing=false;
let _lastFrameTs=0,_fpsArr=[],_fpsTm=0,_fpsDisplay='--',_frameTm=0;
let _projCap=2000;       // max projectiles rendered in 'low' mode
const CODES_USED=new Set();
// DEATH code modifiers
let deathMod=false; // if true, bloon HP*1.5 speed*1.25 on spawn
let PP=[],PS=[],PL=0,lakes=[],treePts=[];
// Cursed Vitality system
let permLives=150; // permanent base HP (separate from display lives which includes CV)
let cv=[]; // [{amount, expiresAt}] — each point expires after 20s
let sacrificialRiteActive=false,sacRiteTm=0,sacRiteDrainAcc=0;
// Glove ability
let gloveMode=false,gloveSource=null; // gloveSource = tower being moved

function cvTotal(){return cv.reduce((s,c)=>s+c.amount,0);}
function addCV(amt){cv.push({amount:amt,expiresAt:Date.now()+20000});lives=permLives+cvTotal();updUI();}
function loseLife(n){
  // Bloon leaking: damage CV first, then perm lives
  let remaining=n;
  for(let i=cv.length-1;i>=0&&remaining>0;i--){
    const take=Math.min(cv[i].amount,remaining);
    cv[i].amount-=take;remaining-=take;
    if(cv[i].amount<=0)cv.splice(i,1);
  }
  if(remaining>0){permLives=Math.max(0,permLives-remaining);}
  lives=permLives+cvTotal();
  updUI();
}

// ═══════════════════════════════════════════════════════
// RANDOM PATH GENERATION (with optional loop)
// ═══════════════════════════════════════════════════════
function generatePath(){
  const COLS=12,ROWS=9;
  const cw=W/COLS,ch=H/ROWS;
  const margin=1;
  // Start at left-center, end at right
  let cx=0,cy=Math.floor(ROWS/2);
  const visited=new Set([`${cx},${cy}`]);
  const rawPts=[{x:-cw*.3,y:(cy+.5)*ch}];
  let tries=0,loopMade=false;

  while(cx<COLS-1&&tries<600){
    tries++;
    const r=Math.random();
    let nx=cx,ny=cy;
    if(r<.50){nx=cx+1;}
    else if(r<.72){ny=Math.max(margin,cy-1);}
    else{ny=Math.min(ROWS-1-margin,cy+1);}
    const k=`${nx},${ny}`;
    // Allow looping back once per path for variety
    if(!visited.has(k)||(nx>cx&&Math.random()<.12&&!loopMade)){
      if(visited.has(k))loopMade=true;
      visited.add(k);
      cx=nx;cy=ny;
      rawPts.push({x:(cx+.5)*cw,y:(cy+.5)*ch});
      if(cx>=COLS-1)break;
    }
  }
  rawPts.push({x:W+cw*.3,y:(cy+.5)*ch});

  // Randomly add a U-loop detour in the middle third
  if(Math.random()<.55&&rawPts.length>6){
    const mid=Math.floor(rawPts.length/2);
    const anchor=rawPts[mid];
    const loopDir=Math.random()<.5?-1:1;
    const loopDepth=ch*(1.5+Math.random()*1.5)*loopDir;
    const lp=[
      {x:anchor.x-cw*.5,y:anchor.y},
      {x:anchor.x-cw*.5,y:anchor.y+loopDepth},
      {x:anchor.x+cw*.5,y:anchor.y+loopDepth},
      {x:anchor.x+cw*.5,y:anchor.y}
    ];
    rawPts.splice(mid,0,...lp);
  }

  // Smooth with midpoints
  PP=[];
  for(let i=0;i<rawPts.length-1;i++){
    PP.push(rawPts[i]);
    const mx=(rawPts[i].x+rawPts[i+1].x)/2;
    const my=(rawPts[i].y+rawPts[i+1].y)/2;
    PP.push({x:mx,y:my});
  }
  PP.push(rawPts[rawPts.length-1]);

  // Segment lengths
  PS=[];PL=0;
  for(let i=0;i<PP.length-1;i++){
    const dx=PP[i+1].x-PP[i].x,dy=PP[i+1].y-PP[i].y;
    const l=Math.sqrt(dx*dx+dy*dy);
    PS.push(l);PL+=l;
  }

  // Generate 3-5 larger lakes away from path
  lakes=[];
  for(let a=0;a<20&&lakes.length<5;a++){
    const lx=W*(.12+Math.random()*.76);
    const ly=H*(.12+Math.random()*.76);
    const rx=70+Math.random()*80;
    const ry=45+Math.random()*60;
    let ok=true;
    for(let i=0;i<PP.length-1;i++){
      const dx=PP[i+1].x-PP[i].x,dy=PP[i+1].y-PP[i].y;
      const len=Math.sqrt(dx*dx+dy*dy);
      for(let t=0;t<=1;t+=.08){
        const px=PP[i].x+dx*t,py=PP[i].y+dy*t;
        const edx=(lx-px)/rx,edy=(ly-py)/ry;
        if(edx*edx+edy*edy<1.8){ok=false;break;}
      }
      if(!ok)break;
    }
    // Check lakes don't overlap each other
    if(ok)for(const l2 of lakes){
      const ddx=(lx-l2.cx)/(rx+l2.rx+20),ddy=(ly-l2.cy)/(ry+l2.ry+20);
      if(ddx*ddx+ddy*ddy<1){ok=false;break;}
    }
    if(ok)lakes.push({cx:lx,cy:ly,rx,ry});
  }

  // Trees
  treePts=[];
  for(let i=0;i<28;i++){
    const tx=W*(.04+Math.random()*.92),ty=H*(.04+Math.random()*.92);
    let ok=true;
    for(const l of lakes){const dx=(tx-l.cx)/l.rx,dy=(ty-l.cy)/l.ry;if(dx*dx+dy*dy<1.4){ok=false;break;}}
    if(ok&&!onPathRaw(tx,ty,58))treePts.push({x:tx,y:ty,r:13+Math.random()*11});
  }
}

function onPathRaw(x,y,thr=42){
  for(let i=0;i<PP.length-1;i++){
    const dx=PP[i+1].x-PP[i].x,dy=PP[i+1].y-PP[i].y;
    const len=Math.sqrt(dx*dx+dy*dy);
    if(len===0)continue;
    const t=Math.max(0,Math.min(1,((x-PP[i].x)*dx+(y-PP[i].y)*dy)/(len*len)));
    const cx=PP[i].x+t*dx,cy=PP[i].y+t*dy;
    if(Math.sqrt((x-cx)*(x-cx)+(y-cy)*(y-cy))<thr)return true;
  }
  return false;
}

function pathPos(d){
  let r=d;
  for(let i=0;i<PS.length;i++){
    if(r<=PS[i]){const t=r/PS[i];return{x:PP[i].x+(PP[i+1].x-PP[i].x)*t,y:PP[i].y+(PP[i+1].y-PP[i].y)*t,done:false};}
    r-=PS[i];
  }
  return{x:PP[PP.length-1].x,y:PP[PP.length-1].y,done:true};
}

// ═══════════════════════════════════════════════════════
// BLOON TYPES
// ═══════════════════════════════════════════════════════
const BT_LIST=[
  {id:'red',    col:'#e74c3c',hp:1,    spd:1.0, armor:0, camo:false,isMoab:false,w:17,h:22,reward:3},
  {id:'blue',   col:'#3498db',hp:2,    spd:1.4, armor:1, camo:false,isMoab:false,w:17,h:22,reward:5},
  {id:'green',  col:'#2ecc71',hp:3,    spd:1.8, armor:2, camo:false,isMoab:false,w:17,h:22,reward:7},
  {id:'yellow', col:'#f1c40f',hp:4,    spd:3.2, armor:3, camo:false,isMoab:false,w:17,h:22,reward:9},
  {id:'pink',   col:'#e91e8c',hp:5,    spd:3.5, armor:4, camo:false,isMoab:false,w:17,h:22,reward:11},
  {id:'black',  col:'#2c3e50',hp:11,   spd:1.8, armor:5, camo:false,isMoab:false,w:19,h:25,reward:13},

// WAVE POOL
// ═══════════════════════════════════════════════════════
function getPool(n){
  const p=[];
  const base=n<=1?1:n<=2?2:n<=4?3:n<=6?3:n<=8?4:n<=11?4:n<=13?5:n<=15?6:n<=17?7:n<=20?9:10;
  for(let i=0;i<Math.min(base,11);i++)p.push(BT_LIST[i]);
  if(n>=8) p.push(getBT('camo_r'));
  if(n>=13)p.push(getBT('camo_p'));
  if(n>=18)p.push(getBT('camo_rb'));
  if(n>=23)p.push(getBT('camo_c'));
  if(n>=25)p.push(getBT('moab'));
  if(n>=30)p.push(getBT('bfb'));
  if(n>=38)p.push(getBT('zomg'));
  if(n>=40)p.push(getBT('ddt'));
  if(n>=45){p.push(getBT('fort_ceramic'));p.push(getBT('fort_lead'));}
  if(n>=50)p.push(getBT('fort_moab'));
  if(n>=52)p.push(getBT('doomab'));
  if(n>=55)p.push(getBT('fort_bfb'));
  if(n>=58)p.push(getBT('airship'));
  if(n>=60)p.push(getBT('doom'));
  if(n>=62){p.push(getBT('fort_zomg'));p.push(getBT('doomship'));}
  if(n>=65){p.push(getBT('fort_ddt'));p.push(getBT('doomcarrier'));}
  if(n>=70)p.push(getBT('obsidian'));
  if(n>=75)p.push(getBT('oddt'));
  if(n>=78)p.push(getBT('obsidianite'));
  if(n>=80)p.push(getBT('bad'));
  if(n>=90)p.push(getBT('motherdoom'));
  return p;
}
function genWave(n){
  const pool=getPool(n),cnt=10+Math.floor(n*2.5),scale=1+n*.12,gap=Math.max(140,900-n*22),q=[];
  for(let i=0;i<cnt;i++){
    const w=pool.map((_,j)=>Math.max(1,pool.length-j)),tot=w.reduce((a,b)=>a+b,0);
    let r=Math.random()*tot,ch=pool[0];
    for(let j=0;j<pool.length;j++){r-=w[j];if(r<=0){ch=pool[j];break;}}
    q.push({def:ch,delay:i*gap,hp:Math.round(ch.hp*scale)});
  }
  return q;
}

// CANVAS & MAP

const mc=document.getElementById('mc'),oc=document.getElementById('oc');
const ctx=mc.getContext('2d'),octx=oc.getContext('2d');

function resize(){
  const wr=document.getElementById('mapwrap');
  W=wr.clientWidth;H=wr.clientHeight;
  mc.width=W;mc.height=H;oc.width=W;oc.height=H;
  generatePath();drawMap();
}

function drawMap(){
  ctx.clearRect(0,0,W,H);

  // ── GROUND: rich multi-tone turf with subtle vignette ──
  const gnd=ctx.createRadialGradient(W*.5,H*.5,0,W*.5,H*.5,Math.max(W,H)*.7);
  gnd.addColorStop(0,'#6db84a');gnd.addColorStop(.5,'#58a038');gnd.addColorStop(1,'#3d7a22');
  ctx.fillStyle=gnd;ctx.fillRect(0,0,W,H);

  // Fine grass tufts – short strokes scattered everywhere
  ctx.save();
  for(let i=0;i<320;i++){
    const gx=(i*173+i*i*.1)%W, gy=(i*97+i*31*.05)%H;
    const bright=i%3===0;
    ctx.strokeStyle=bright?`rgba(130,200,60,${.18+((i*7)%10)*.014})`:`rgba(0,60,0,${.07+((i*11)%10)*.008})`;
    ctx.lineWidth=1+((i*3)%3)*.5;ctx.lineCap='round';
    const h2=3+((i*5)%8);
    ctx.beginPath();ctx.moveTo(gx,gy);
    ctx.quadraticCurveTo(gx+((i%5)-2)*2,gy-h2*.6,gx+((i%3)-1),gy-h2);
    ctx.stroke();
  }
  ctx.restore();

  // Scattered wildflowers
  const flowers=[
    [.05,.12,'#ffdd44'],[.15,.72,'#ff88cc'],[.28,.35,'#ffcc22'],[.42,.82,'#ff6699'],
    [.58,.18,'#ffee55'],[.68,.62,'#ff99cc'],[.82,.22,'#ffe030'],[.92,.82,'#ff77bb'],
    [.72,.85,'#ffdd44'],[.35,.15,'#ffaadd'],[.88,.48,'#ffee44'],[.12,.52,'#ff8888'],
    [.50,.70,'#ffe055'],[.24,.88,'#ffbbcc'],[.78,.45,'#f5c542'],[.48,.28,'#ff99ee'],
  ];
  ctx.save();
  flowers.forEach(([fx,fy,fc])=>{
    const x2=fx*W,y2=fy*H;
    if(onPathRaw(x2,y2,55))return;
    ctx.fillStyle=fc;
    for(let p=0;p<5;p++){const a=p*Math.PI*.4-Math.PI*.5;ctx.beginPath();ctx.ellipse(x2+Math.cos(a)*4,y2+Math.sin(a)*4,3.5,2.2,a,0,Math.PI*2);ctx.fill();}
    ctx.fillStyle='#fff7aa';ctx.beginPath();ctx.arc(x2,y2,2.5,0,Math.PI*2);ctx.fill();
  });
  ctx.restore();

  // Scattered mossy rocks
  const rocks=[
    [.09,.42,.6],[.18,.28,.7],[.38,.62,.55],[.52,.30,.65],[.64,.80,.7],
    [.76,.55,.6],[.88,.35,.55],[.30,.75,.5],[.62,.22,.6],[.46,.90,.45],
  ];
  ctx.save();
  rocks.forEach(([fx,fy,sc])=>{
    const rx=fx*W,ry=fy*H,rs=(14+sc*10);
    if(onPathRaw(rx,ry,52))return;
    ctx.fillStyle='rgba(0,0,0,.12)';ctx.beginPath();ctx.ellipse(rx+rs*.3,ry+rs*.6,rs*.9,rs*.3,.2,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=`hsl(30,${12+sc*15}%,${38+sc*20}%)`;ctx.beginPath();ctx.ellipse(rx,ry,rs,rs*.65,.15,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=`hsl(30,8%,${50+sc*18}%)`;ctx.beginPath();ctx.ellipse(rx-rs*.2,ry-rs*.15,rs*.45,rs*.32,.05,0,Math.PI*2);ctx.fill();
    // Moss
    ctx.fillStyle='rgba(60,140,30,.35)';ctx.beginPath();ctx.ellipse(rx-rs*.1,ry-rs*.2,rs*.55,rs*.22,-.2,0,Math.PI*2);ctx.fill();
  });
  ctx.restore();

  // ── LAKES with deep teal water ──
  for(const l of lakes){
    ctx.save();
    // Deep shadow under lake
    ctx.fillStyle='rgba(0,0,0,.25)';ctx.beginPath();ctx.ellipse(l.cx+6,l.cy+8,l.rx+6,l.ry+4,0,0,Math.PI*2);ctx.fill();
    // Water gradient (teal/turquoise tropical look)
    const wg=ctx.createRadialGradient(l.cx-l.rx*.25,l.cy-l.ry*.22,l.ry*.05,l.cx,l.cy,Math.max(l.rx,l.ry));
    wg.addColorStop(0,'#74d7e8');wg.addColorStop(.35,'#2aadca');wg.addColorStop(.75,'#1580a0');wg.addColorStop(1,'#0a5472');
    ctx.beginPath();ctx.ellipse(l.cx,l.cy,l.rx,l.ry,0,0,Math.PI*2);ctx.fillStyle=wg;ctx.fill();
    // Sandy shore rim
    ctx.strokeStyle='#c8a96e';ctx.lineWidth=6;ctx.stroke();
    ctx.strokeStyle='rgba(220,190,130,.4)';ctx.lineWidth=3;ctx.stroke();
    // Caustic shimmer ripples
    ctx.globalAlpha=.2;ctx.strokeStyle='#aef';ctx.lineWidth=1.2;
    for(let ri=0;ri<4;ri++){
      const rfrac=.3+ri*.18;
      ctx.beginPath();ctx.ellipse(l.cx+l.rx*.08*(ri%2?-1:1),l.cy+l.ry*.06*(ri%3?-1:1),l.rx*rfrac,l.ry*rfrac*.65,0,0,Math.PI*2);ctx.stroke();
    }
    // Lily pads
    ctx.globalAlpha=.85;
    const padCols=['#2d8c2d','#36a832','#4ac84a'];
    [[ -.38,-.28],[ .30,-.08],[ -.08, .34],[ .42, .26],[-.28, .15]].forEach(([dx,dy],pi)=>{
      const px=l.cx+dx*l.rx,py=l.cy+dy*l.ry;
      ctx.fillStyle=padCols[pi%3];ctx.beginPath();ctx.arc(px,py,l.ry*.13,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#1a6a1a';ctx.beginPath();ctx.moveTo(px,py);ctx.arc(px,py,l.ry*.13,-Math.PI*.15,Math.PI*.15);ctx.closePath();ctx.fill();
      // Pink flower on some pads
      if(pi%2===0){ctx.fillStyle='#ff88bb';ctx.beginPath();ctx.arc(px,py,l.ry*.055,0,Math.PI*2);ctx.fill();}
    });
    // Edge reeds
    ctx.globalAlpha=.7;ctx.strokeStyle='#5a8a22';ctx.lineWidth=2;ctx.lineCap='round';
    [.1,.35,.65,.85].forEach(frac=>{
      const rx2=l.cx+Math.cos(frac*Math.PI*2)*l.rx*.92;
      const ry2=l.cy+Math.sin(frac*Math.PI*2)*l.ry*.92;
      ctx.beginPath();ctx.moveTo(rx2,ry2+12);ctx.quadraticCurveTo(rx2+3,ry2-8,rx2-2,ry2-18);ctx.stroke();
      ctx.fillStyle='#3a6a12';ctx.beginPath();ctx.ellipse(rx2-2,ry2-18,4,9,.3,0,Math.PI*2);ctx.fill();
    });
    ctx.restore();
  }

  // ── PATH: cobblestone + mossy stone look ──
  ctx.save();
  ctx.lineCap='round';ctx.lineJoin='round';
  // Outer shadow
  ctx.strokeStyle='rgba(0,0,0,.38)';ctx.lineWidth=62;
  ctx.beginPath();ctx.moveTo(PP[0].x,PP[0].y);for(let i=1;i<PP.length;i++)ctx.lineTo(PP[i].x,PP[i].y);ctx.stroke();
  // Base stone colour
  ctx.strokeStyle='#7a8a72';ctx.lineWidth=54;
  ctx.beginPath();ctx.moveTo(PP[0].x,PP[0].y);for(let i=1;i<PP.length;i++)ctx.lineTo(PP[i].x,PP[i].y);ctx.stroke();
  // Lighter stone top layer
  ctx.strokeStyle='#909e86';ctx.lineWidth=46;ctx.globalAlpha=.9;
  ctx.beginPath();ctx.moveTo(PP[0].x,PP[0].y);for(let i=1;i<PP.length;i++)ctx.lineTo(PP[i].x,PP[i].y);ctx.stroke();
  // Moss/worn centre channel
  ctx.strokeStyle='#6a7a5e';ctx.lineWidth=32;ctx.globalAlpha=.55;
  ctx.beginPath();ctx.moveTo(PP[0].x,PP[0].y);for(let i=1;i<PP.length;i++)ctx.lineTo(PP[i].x,PP[i].y);ctx.stroke();
  // Centre worn highlight
  ctx.strokeStyle='#b0c0a4';ctx.lineWidth=14;ctx.globalAlpha=.3;
  ctx.beginPath();ctx.moveTo(PP[0].x,PP[0].y);for(let i=1;i<PP.length;i++)ctx.lineTo(PP[i].x,PP[i].y);ctx.stroke();
  // Edge moss fringe
  ctx.strokeStyle='#5a7a38';ctx.lineWidth=58;ctx.globalAlpha=.18;ctx.setLineDash([8,22]);
  ctx.beginPath();ctx.moveTo(PP[0].x,PP[0].y);for(let i=1;i<PP.length;i++)ctx.lineTo(PP[i].x,PP[i].y);ctx.stroke();
  ctx.setLineDash([]);ctx.restore();

  // Stone cobble tiles along path (drawn as individual rounded rects)
  ctx.save();ctx.globalAlpha=.22;
  const tileStep=30;
  for(let d=tileStep;d<PL-tileStep;d+=tileStep){
    const sp=pathPos(d);
    // Alternating offsets to look natural
    const wobX=((d*17)%14)-7,wobY=((d*11)%10)-5;
    const tw=18+((d*7)%10),th=12+((d*5)%8);
    ctx.fillStyle=d%60<30?'rgba(50,60,40,.3)':'rgba(150,160,130,.25)';
    ctx.save();
    const ang=Math.atan2(PP[Math.min(1,Math.floor(d/PL*(PP.length-1)+1))].y-PP[Math.max(0,Math.floor(d/PL*(PP.length-1)))].y,
      PP[Math.min(1,Math.floor(d/PL*(PP.length-1)+1))].x-PP[Math.max(0,Math.floor(d/PL*(PP.length-1)))].x);
    ctx.translate(sp.x+wobX,sp.y+wobY);ctx.rotate(ang);
    rr(ctx,-tw/2,-th/2,tw,th,3);ctx.fill();
    ctx.restore();
  }
  ctx.restore();

  // ── TREES (tropical jungle style) ──
  for(const t of treePts)drawTree(ctx,t.x,t.y,t.r);

  // ── Fireflies / sparkle ambient dots ──
  ctx.save();
  for(let i=0;i<40;i++){
    const fx=(i*287+i*i*.08)%W, fy=(i*157+i*43*.06)%H;
    if(onPathRaw(fx,fy,50))continue;
    const alpha=.08+((i*13)%20)*.008;
    ctx.fillStyle=`rgba(220,255,120,${alpha})`;
    ctx.beginPath();ctx.arc(fx,fy,1.5+((i*3)%3)*.5,0,Math.PI*2);ctx.fill();
  }
  ctx.restore();

  // START / EXIT signs (stylized wooden sign look)
  ctx.save();
  [[PP[0],'▶ START',34],[PP[PP.length-1],'EXIT ▶',-38]].forEach(([p,label,xoff])=>{
    const sx=p.x+xoff,sy=p.y+15;
    // Sign board
    ctx.fillStyle='#6b4226';rr(ctx,sx-30,sy-12,60,20,4);ctx.fill();
    ctx.fillStyle='rgba(255,255,255,.08)';rr(ctx,sx-28,sy-10,56,8,2);ctx.fill();
    ctx.strokeStyle='rgba(0,0,0,.5)';ctx.lineWidth=1.5;rr(ctx,sx-30,sy-12,60,20,4);ctx.stroke();
    ctx.fillStyle='#ffe8b0';ctx.font='bold 10px Nunito';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(label,sx,sy);
    // Post
    ctx.fillStyle='#5a3518';ctx.fillRect(sx-3,sy+8,6,18);
  });
  ctx.restore();
}

function drawTree(c,x,y,r){
  c.save();
  // Ground shadow (elongated ellipse for sun angle)
  c.fillStyle='rgba(0,0,0,.18)';c.beginPath();c.ellipse(x+r*.35,y+r*.62,r*.95,r*.3,.25,0,Math.PI*2);c.fill();
  // Trunk – tapered
  const tg=c.createLinearGradient(x-r*.18,y,x+r*.18,y+r*.8);
  tg.addColorStop(0,'#7a4820');tg.addColorStop(1,'#4a2a0a');
  c.fillStyle=tg;
  c.beginPath();c.moveTo(x-r*.18,y+r*.85);c.quadraticCurveTo(x-r*.2,y+r*.4,x-r*.12,y);
  c.lineTo(x+r*.12,y);c.quadraticCurveTo(x+r*.2,y+r*.4,x+r*.18,y+r*.85);c.closePath();c.fill();
  // Trunk bark lines
  c.strokeStyle='rgba(0,0,0,.15)';c.lineWidth=1;
  for(let i=0;i<3;i++){const ty2=y+r*(.15+i*.2);c.beginPath();c.moveTo(x-r*.14+i*2,ty2);c.quadraticCurveTo(x,ty2-r*.04,x+r*.14-i*2,ty2+r*.02);c.stroke();}
  // Bottom canopy (darkest, widest)
  c.fillStyle='#246818';c.beginPath();c.ellipse(x+r*.08,y-r*.02,r*1.02,r*.72,0,0,Math.PI*2);c.fill();
  // Mid canopy
  c.fillStyle='#2d8020';c.beginPath();c.ellipse(x-r*.1,y-r*.32,r*.85,r*.65,-.15,0,Math.PI*2);c.fill();
  // Top canopy (lightest)
  c.fillStyle='#3aaa28';c.beginPath();c.ellipse(x+r*.12,y-r*.56,r*.72,r*.58,.1,0,Math.PI*2);c.fill();
  // Bright top highlight
  c.fillStyle='#5ec840';c.beginPath();c.ellipse(x+r*.04,y-r*.7,r*.42,r*.35,.05,0,Math.PI*2);c.fill();
  // Shiny leaf specular
  c.fillStyle='rgba(200,255,160,.18)';c.beginPath();c.ellipse(x-r*.12,y-r*.74,r*.22,r*.14,-.5,0,Math.PI*2);c.fill();
  // A few hanging leaves
  c.strokeStyle='#2c9020';c.lineWidth=1.8;c.lineCap='round';
  [-.7,-.3,.2,.65].forEach((xf,i)=>{
    const lx=x+xf*r,ly=y+[-r*.12,-r*.05,r*.08,-r*.18][i];
    c.beginPath();c.moveTo(lx,ly);c.quadraticCurveTo(lx+(i%2?4:-4),ly+r*.28,lx+(i%2?2:-6),ly+r*.42);c.stroke();
  });
  // Fruit (random orange/yellow dots on some trees)
  if((x+y)%70<35){
    c.fillStyle='#f5a623';
    [[ .3,-.2],[-.35,-.1],[ .15,-.5]].forEach(([dx,dy])=>{c.beginPath();c.arc(x+dx*r,y+dy*r,r*.1,0,Math.PI*2);c.fill();});
  }
  c.restore();
}

function rr(c,x,y,w,h,r){c.beginPath();c.moveTo(x+r,y);c.lineTo(x+w-r,y);c.arcTo(x+w,y,x+w,y+r,r);c.lineTo(x+w,y+h-r);c.arcTo(x+w,y+h,x+w-r,y+h,r);c.lineTo(x+r,y+h);c.arcTo(x,y+h,x,y+h-r,r);c.lineTo(x,y+r);c.arcTo(x,y,x+r,y,r);c.closePath();}

// ═══════════════════════════════════════════════════════
// DRAW MONKEY
// ═══════════════════════════════════════════════════════
const BCOLS={dart:['#8B5E3C','#A07150'],boomerang:['#7B4E2A','#9B6B40'],tack:['#6B3E20','#8B5535'],glue:['#5A8A3C','#72A850'],ice:['#4A7AB5','#6090CC'],sniper:['#5A4A3A','#705A48'],banana:['#4A7A3A','#60924C'],pirate:['#2C4A7A','#3D6BAA'],wizard:['#5A2A7A','#7A3AA0'],caveman:['#7A5A2A','#9A7A3A'],ninja:['#2A2A2A','#3A3A4A'],weaver:['#3A2A6A','#5A4A9A'],ace:['#5A3A1A','#7A5A2A'],sub:['#1A4A6A','#2A6A9A'],heli:['#3A3A5A','#5A5A7A'],sentry:['#6A2A2A','#9A4A4A'],spike:['#4A3A1A','#7A6A2A'],orbital:['#1A2A5A','#2A4A8A'],cursed:['#3A0A2A','#5A1A3A'],hypno:['#7A2A6A','#A050A0']};
const TINTS=['','rgba(255,180,0,.15)','rgba(255,100,0,.18)','rgba(180,50,200,.16)','rgba(255,50,50,.18)'];

function drawMonkey(c,x,y,type,sz,upgs){
  const tier=upgs?Math.max(...upgs):0;
  const [bc,hc]=(BCOLS[type]||['#8B5E3C','#A07150']);
  const s=sz;
  c.save();
  c.fillStyle='rgba(0,0,0,.22)';c.beginPath();c.ellipse(x,y+s*.52,s*.68,s*.19,0,0,Math.PI*2);c.fill();
  c.fillStyle=bc;rr(c,x-s*.35,y-s*.08,s*.7,s*.52,s*.1);c.fill();
  c.fillStyle='rgba(255,255,255,.09)';rr(c,x-s*.28,y-s*.01,s*.4,s*.22,s*.06);c.fill();
  c.fillStyle='#D4A574';c.beginPath();c.ellipse(x,y+s*.15,s*.2,s*.18,0,0,Math.PI*2);c.fill();
  c.strokeStyle=bc;c.lineWidth=s*.17;c.lineCap='round';
  c.beginPath();c.moveTo(x-s*.35,y+s*.06);c.lineTo(x-s*.58,y+s*.28);c.stroke();
  c.beginPath();c.moveTo(x+s*.35,y+s*.06);c.lineTo(x+s*.58,y+s*.28);c.stroke();
  c.fillStyle=hc;c.beginPath();c.arc(x,y-s*.23,s*.37,0,Math.PI*2);c.fill();
  c.fillStyle='#D4A574';
  c.beginPath();c.ellipse(x-s*.3,y-s*.24,s*.12,s*.1,-.3,0,Math.PI*2);c.fill();
  c.beginPath();c.ellipse(x+s*.3,y-s*.24,s*.12,s*.1,.3,0,Math.PI*2);c.fill();
  c.fillStyle='#C8956C';c.beginPath();c.ellipse(x,y-s*.16,s*.2,s*.17,0,0,Math.PI*2);c.fill();
  c.fillStyle='#1a0800';
  c.beginPath();c.arc(x-s*.11,y-s*.26,s*.055,0,Math.PI*2);c.fill();
  c.beginPath();c.arc(x+s*.11,y-s*.26,s*.055,0,Math.PI*2);c.fill();
  c.fillStyle='#fff';
  c.beginPath();c.arc(x-s*.095,y-s*.275,s*.018,0,Math.PI*2);c.fill();
  c.beginPath();c.arc(x+s*.125,y-s*.275,s*.018,0,Math.PI*2);c.fill();
  c.fillStyle='rgba(100,50,0,.5)';
  c.beginPath();c.arc(x-s*.045,y-s*.14,s*.025,0,Math.PI*2);c.fill();
  c.beginPath();c.arc(x+s*.045,y-s*.14,s*.025,0,Math.PI*2);c.fill();
  drawAcc(c,x,y,type,s);
  if(tier>0&&TINTS[Math.min(tier,4)]){c.fillStyle=TINTS[Math.min(tier,4)];c.beginPath();c.arc(x,y-s*.23,s*.37,0,Math.PI*2);c.fill();rr(c,x-s*.35,y-s*.08,s*.7,s*.52,s*.1);c.fill();}
  c.restore();
}

function drawAcc(c,x,y,type,s){
  switch(type){
    case'dart':c.strokeStyle='#ddd';c.lineWidth=s*.07;c.beginPath();c.moveTo(x+s*.5,y+s*.28);c.lineTo(x+s*.82,y+s*.05);c.stroke();c.fillStyle='#bbb';c.beginPath();c.arc(x+s*.5,y+s*.28,s*.055,0,Math.PI*2);c.fill();break;
    case'boomerang':c.strokeStyle='#C8A040';c.lineWidth=s*.1;c.beginPath();c.arc(x+s*.52,y+s*.08,s*.33,-.55,Math.PI*.75);c.stroke();break;
    case'tack':c.fillStyle='#aaa';for(let i=0;i<4;i++){const a=i*Math.PI*.5+Math.PI*.25;c.beginPath();c.arc(x+Math.cos(a)*s*.55,y+Math.sin(a)*s*.55,s*.06,0,Math.PI*2);c.fill();}break;
    case'glue':c.fillStyle='rgba(80,200,60,.65)';c.beginPath();c.ellipse(x+s*.48,y+s*.18,s*.17,s*.12,-.4,0,Math.PI*2);c.fill();break;
    case'ice':c.strokeStyle='rgba(160,230,255,.75)';c.lineWidth=s*.04;for(let i=0;i<6;i++){const a=i*Math.PI/3;c.beginPath();c.moveTo(x,y);c.lineTo(x+Math.cos(a)*s*.52,y+Math.sin(a)*s*.52);c.stroke();}break;
    case'sniper':c.strokeStyle='#666';c.lineWidth=s*.09;c.beginPath();c.moveTo(x-s*.38,y+s*.06);c.lineTo(x-s*.9,y+s*.06);c.stroke();c.strokeStyle='#888';c.lineWidth=s*.06;c.beginPath();c.moveTo(x-s*.5,y+s*.01);c.lineTo(x-s*.9,y+s*.01);c.stroke();break;
    case'banana':c.fillStyle='#f1c40f';c.beginPath();c.arc(x+s*.4,y-.1*s,s*.14,0,Math.PI*2);c.fill();c.strokeStyle='#d4ac0d';c.lineWidth=s*.04;c.beginPath();c.arc(x+s*.4,y+s*.18,s*.2,-Math.PI*.8,-.1);c.stroke();break;
    case'pirate':c.fillStyle='#1a1a1a';c.beginPath();c.moveTo(x-s*.3,y-s*.5);c.lineTo(x+s*.3,y-s*.5);c.lineTo(x+s*.38,y-s*.38);c.lineTo(x-s*.38,y-s*.38);c.closePath();c.fill();c.fillStyle='#c0392b';c.fillRect(x-s*.38,y-s*.38,s*.76,s*.08);break;
    case'wizard':c.fillStyle='#4A2080';c.beginPath();c.moveTo(x,y-s*.7);c.lineTo(x-s*.28,y-s*.45);c.lineTo(x+s*.28,y-s*.45);c.closePath();c.fill();c.fillStyle='#6A30B0';c.beginPath();c.ellipse(x,y-s*.42,s*.3,s*.09,0,0,Math.PI*2);c.fill();c.strokeStyle='#9b59b6';c.lineWidth=s*.05;c.beginPath();c.moveTo(x+s*.42,y+s*.25);c.lineTo(x+s*.65,y);c.stroke();c.fillStyle='#e8daef';c.beginPath();c.arc(x+s*.65,y,s*.07,0,Math.PI*2);c.fill();break;
    case'caveman':c.fillStyle='#8B5E3C';rr(c,x+s*.42,y,s*.15,s*.38,s*.07);c.fill();break;
    case'ninja':c.fillStyle='#1a1a2e';c.beginPath();c.arc(x,y-s*.14,s*.22,Math.PI,Math.PI*2);c.fill();c.fillRect(x-s*.22,y-s*.22,s*.44,s*.1);c.fillStyle='#aaa';c.beginPath();c.arc(x+s*.5,y+s*.1,s*.08,0,Math.PI*2);c.fill();break;
    case'weaver':c.strokeStyle='rgba(180,100,255,.8)';c.lineWidth=s*.04;for(let i=0;i<4;i++){const a=i*Math.PI*.5+Math.PI*.25,rx=x+Math.cos(a)*s*.6,ry=y+Math.sin(a)*s*.6;c.fillStyle='rgba(140,60,220,.9)';c.beginPath();c.arc(rx,ry,s*.09,0,Math.PI*2);c.fill();c.beginPath();c.moveTo(x,y);c.lineTo(rx,ry);c.stroke();}break;
    case'ace':c.strokeStyle='#aaa';c.lineWidth=s*.12;c.lineCap='round';c.beginPath();c.moveTo(x-s*.5,y-s*.45);c.lineTo(x+s*.5,y-s*.45);c.stroke();c.fillStyle='rgba(100,180,255,.7)';c.beginPath();c.arc(x,y-s*.15,s*.12,0,Math.PI*2);c.fill();break;
    case'sub':c.fillStyle='#1A6A9A';c.beginPath();c.ellipse(x+s*.2,y+s*.25,s*.55,s*.22,.2,0,Math.PI*2);c.fill();c.strokeStyle='#2A8ABB';c.lineWidth=s*.1;c.lineCap='round';c.beginPath();c.moveTo(x+s*.15,y-s*.15);c.lineTo(x+s*.15,y-s*.5);c.stroke();c.fillStyle='#5BC8F5';c.beginPath();c.arc(x+s*.15,y-s*.5,s*.06,0,Math.PI*2);c.fill();break;
    case'heli':c.strokeStyle='#555';c.lineWidth=s*.08;c.lineCap='round';c.save();c.translate(x,y-s*.3);for(let i=0;i<3;i++){c.rotate(Math.PI*2/3);c.beginPath();c.moveTo(0,0);c.lineTo(s*.7,0);c.stroke();}c.restore();c.fillStyle='#444';c.beginPath();c.arc(x,y-s*.3,s*.07,0,Math.PI*2);c.fill();c.strokeStyle=BCOLS.heli[0];c.lineWidth=s*.1;c.beginPath();c.moveTo(x+s*.2,y+s*.1);c.lineTo(x+s*.7,y);c.stroke();break;
    case'sentry':c.fillStyle='#888';c.beginPath();c.arc(x,y-s*.5,s*.18,0,Math.PI*2);c.fill();c.strokeStyle='#aaa';c.lineWidth=s*.06;c.beginPath();c.moveTo(x,y-s*.32);c.lineTo(x,y-s*.5);c.stroke();c.strokeStyle='#ccc';c.lineWidth=s*.05;c.beginPath();c.arc(x,y-s*.5,s*.25,-Math.PI*.9,-Math.PI*.1);c.stroke();c.fillStyle='#f5c542';c.beginPath();c.arc(x+s*.45,y-s*.1,s*.06,0,Math.PI*2);c.fill();c.beginPath();c.arc(x-s*.45,y-s*.1,s*.06,0,Math.PI*2);c.fill();break;
    case'spike':
      // Machine body — metallic box with gears
      c.fillStyle='#5a4a20';rr(c,x-s*.38,y-s*.1,s*.76,s*.48,s*.08);c.fill();
      c.fillStyle='rgba(255,255,255,.08)';rr(c,x-s*.3,y-s*.04,s*.44,s*.2,s*.04);c.fill();
      // Conveyor belt stripes
      c.strokeStyle='rgba(0,0,0,.3)';c.lineWidth=s*.06;
      for(let i=0;i<4;i++){c.beginPath();c.moveTo(x-s*.3+i*s*.2,y+s*.12);c.lineTo(x-s*.3+i*s*.2,y+s*.32);c.stroke();}
      // Spike launcher nozzle on top
      c.fillStyle='#888';rr(c,x-s*.08,y-s*.46,s*.16,s*.36,s*.04);c.fill();
      c.fillStyle='#aaa';c.beginPath();c.arc(x,y-s*.46,s*.12,0,Math.PI*2);c.fill();
      // Spike tip
      c.fillStyle='#ddd';c.beginPath();c.moveTo(x,y-s*.62);c.lineTo(x-s*.07,y-s*.44);c.lineTo(x+s*.07,y-s*.44);c.closePath();c.fill();
      // Wheels
      c.fillStyle='#333';
      c.beginPath();c.arc(x-s*.28,y+s*.38,s*.1,0,Math.PI*2);c.fill();
      c.beginPath();c.arc(x+s*.28,y+s*.38,s*.1,0,Math.PI*2);c.fill();
      c.fillStyle='#555';
      c.beginPath();c.arc(x-s*.28,y+s*.38,s*.05,0,Math.PI*2);c.fill();
      c.beginPath();c.arc(x+s*.28,y+s*.38,s*.05,0,Math.PI*2);c.fill();
      break;
    case'orbital':
      // Sleek dark body with tech panel
      c.fillStyle='#1a2a5a';rr(c,x-s*.3,y-s*.08,s*.6,s*.48,s*.12);c.fill();
      c.fillStyle='rgba(80,140,255,.2)';rr(c,x-s*.22,y,s*.44,s*.22,s*.06);c.fill();
      // Satellite dish on arm
      c.strokeStyle='#4a8aff';c.lineWidth=s*.07;c.lineCap='round';
      c.beginPath();c.moveTo(x,y-s*.06);c.lineTo(x+s*.48,y-s*.4);c.stroke();
      c.fillStyle='#2a5acc';c.beginPath();c.ellipse(x+s*.48,y-s*.4,s*.16,s*.11,.4,0,Math.PI*2);c.fill();
      c.fillStyle='rgba(120,200,255,.5)';c.beginPath();c.ellipse(x+s*.48,y-s*.4,s*.08,s*.06,.4,0,Math.PI*2);c.fill();
      // Glowing core
      {const og=c.createRadialGradient(x,y+s*.12,0,x,y+s*.12,s*.18);og.addColorStop(0,'rgba(100,180,255,.9)');og.addColorStop(1,'rgba(30,60,180,0)');c.fillStyle=og;c.beginPath();c.arc(x,y+s*.12,s*.18,0,Math.PI*2);c.fill();}

    case'cursed':

      c.fillStyle='rgba(40,0,30,.7)';c.beginPath();c.moveTo(x-s*.5,y+s*.55);c.lineTo(x-s*.38,y-s*.1);c.lineTo(x+s*.38,y-s*.1);c.lineTo(x+s*.5,y+s*.55);c.closePath();c.fill();

      c.fillStyle='rgba(255,80,120,.6)';c.beginPath();c.arc(x-s*.12,y-s*.27,s*.04,0,Math.PI*2);c.fill();c.beginPath();c.arc(x+s*.12,y-s*.27,s*.04,0,Math.PI*2);c.fill();
      // Shadow claw on arm
      c.strokeStyle='rgba(180,0,80,.7)';c.lineWidth=s*.06;c.lineCap='round';
      [-.25,0,.25].forEach(off=>{c.beginPath();c.moveTo(x+s*.52,y+s*.22+off*s*.12);c.lineTo(x+s*.75,y+s*.28+off*s*.18);c.stroke();});
      // Cursed mark on chest (dark spiral rune)
      c.strokeStyle='rgba(200,0,80,.55)';c.lineWidth=s*.035;

      c.beginPath();c.arc(x,y-s*.25,s*.4,0,Math.PI*2);c.stroke();
      break;
  }
}

// ═══════════════════════════════════════════════════════
// DRAW BLOON
// ═══════════════════════════════════════════════════════
function drawBloon(c,b){
  const def=b.def,x=b.x,y=b.y;
  const sc=def.isMoab?1.5:1,w=def.w*sc,h=def.h*sc;
  c.save();
  if(def.camo&&!b.revealed){c.globalAlpha=.5;c.setLineDash([3,3]);}
  if(b.disabledTimer>0)c.globalAlpha=(c.globalAlpha||1)*.55;
  if(def.isMoab){
    const g=c.createRadialGradient(x-w*.2,y-h*.2,h*.1,x,y,Math.max(w,h)*.6);
    g.addColorStop(0,'#fff');g.addColorStop(.3,def.col);g.addColorStop(1,'rgba(0,0,0,.5)');
    c.fillStyle=g;c.beginPath();c.ellipse(x,y,w*.5,h*.45,0,0,Math.PI*2);c.fill();
    if(def.isFort){c.strokeStyle='#f5c542';c.lineWidth=3.5;c.setLineDash([4,3]);c.beginPath();c.ellipse(x,y,w*.5+5,h*.45+5,0,0,Math.PI*2);c.stroke();c.setLineDash([]);}
    if(def.isDdt||def.isODDT){c.strokeStyle='rgba(0,0,0,.45)';c.lineWidth=2;for(let i=-4;i<=4;i++){c.beginPath();c.moveTo(x-w*.5,y+i*7);c.lineTo(x+w*.5,y+i*7);c.stroke();}}
    if(def.isBad||def.isMotherdoom){c.strokeStyle='rgba(200,0,0,.6)';c.lineWidth=5;c.beginPath();c.ellipse(x,y,w*.54,h*.5,0,0,Math.PI*2);c.stroke();}
    if(def.isObsidianite){c.strokeStyle='rgba(100,0,220,.8)';c.lineWidth=5;c.beginPath();c.ellipse(x,y,w*.54,h*.5,0,0,Math.PI*2);c.stroke();}
    if(def.isDoomship||def.isDoomcarrier){c.strokeStyle='rgba(160,0,0,.65)';c.lineWidth=3;c.setLineDash([5,4]);c.beginPath();c.ellipse(x,y,w*.52,h*.48,0,0,Math.PI*2);c.stroke();c.setLineDash([]);}
    if(def.isAirship){c.strokeStyle='rgba(60,110,220,.6)';c.lineWidth=3;c.beginPath();c.ellipse(x,y,w*.52,h*.48,0,0,Math.PI*2);c.stroke();}
    c.strokeStyle='rgba(255,255,255,.32)';c.lineWidth=2;c.setLineDash([]);c.beginPath();c.ellipse(x,y,w*.5,h*.45,0,0,Math.PI*2);c.stroke();
    c.fillStyle='rgba(255,255,255,.82)';c.font=`bold ${Math.max(8,h*.34)}px Lilita One`;c.textAlign='center';c.textBaseline='middle';
    c.fillText((def.isFort?'F-':'')+def.id.replace('fort_','').toUpperCase(),x,y);
    if(def.isMotherdoom&&b.phase){c.fillStyle=['#ff0','#f80','#f33'][b.phase-1];c.font=`bold 10px Lilita One`;c.fillText(`P${b.phase}`,x,y+h*.38);}
  }else{
    const g=c.createRadialGradient(x-w*.22,y-h*.22,h*.08,x,y,Math.max(w,h)*.6);
    g.addColorStop(0,'rgba(255,255,255,.55)');g.addColorStop(.28,def.col);g.addColorStop(1,'rgba(0,0,0,.4)');
    c.fillStyle=g;c.beginPath();c.moveTo(x,y+h*.48);c.bezierCurveTo(x-w*.5,y+h*.28,x-w*.52,y-h*.32,x,y-h*.48);c.bezierCurveTo(x+w*.52,y-h*.32,x+w*.5,y+h*.28,x,y+h*.48);c.fill();
    c.fillStyle='rgba(255,255,255,.28)';c.beginPath();c.ellipse(x-w*.1,y-h*.18,w*.16,h*.09,-.5,0,Math.PI*2);c.fill();
    c.fillStyle='rgba(0,0,0,.45)';c.beginPath();c.arc(x,y+h*.46,w*.065,0,Math.PI*2);c.fill();
    if(def.isFort){c.strokeStyle='#f5c542';c.lineWidth=2.5;c.setLineDash([3,2]);c.beginPath();c.moveTo(x,y+h*.48);c.bezierCurveTo(x-w*.52,y+h*.3,x-w*.54,y-h*.34,x,y-h*.5);c.bezierCurveTo(x+w*.54,y-h*.34,x+w*.52,y+h*.3,x,y+h*.48);c.stroke();c.setLineDash([]);}
    if(def.isDoom){c.strokeStyle='rgba(180,0,0,.5)';c.lineWidth=2;c.beginPath();c.moveTo(x,y+h*.48);c.bezierCurveTo(x-w*.5,y+h*.28,x-w*.52,y-h*.32,x,y-h*.48);c.bezierCurveTo(x+w*.52,y-h*.32,x+w*.5,y+h*.28,x,y+h*.48);c.stroke();}
    if(def.magicImmune){c.strokeStyle='rgba(200,80,255,.6)';c.lineWidth=1.5;c.setLineDash([2,2]);c.beginPath();c.moveTo(x,y+h*.48);c.bezierCurveTo(x-w*.5,y+h*.28,x-w*.52,y-h*.32,x,y-h*.48);c.bezierCurveTo(x+w*.52,y-h*.32,x+w*.5,y+h*.28,x,y+h*.48);c.stroke();c.setLineDash([]);}
  }
  if(b.hp<b.maxHp){
    const bw=def.isMoab?w*.9:w*.85,bx=x-bw*.5,by=y+(def.isMoab?h*.52+5:h*.54);
    const pct=Math.max(0,b.hp/b.maxHp);
    c.fillStyle='rgba(0,0,0,.55)';rr(c,bx,by,bw,4,2);c.fill();
    c.fillStyle=pct>.6?'#2ecc71':pct>.3?'#f39c12':'#e74c3c';rr(c,bx,by,bw*pct,4,2);c.fill();
  }
  if(b.frozen){c.globalAlpha=.35;c.fillStyle='#a8d8f0';c.beginPath();c.arc(x,y,Math.max(w,h)*.5+2,0,Math.PI*2);c.fill();}
  if(b.glued){c.globalAlpha=.2;c.fillStyle='#80cc40';c.beginPath();c.arc(x,y,Math.max(w,h)*.5+2,0,Math.PI*2);c.fill();}
  if(b.disabledTimer>0){c.globalAlpha=.4;c.fillStyle='#fff';c.beginPath();c.arc(x,y-h*.5-7,5,0,Math.PI*2);c.fill();}
  c.restore();
}

// ═══════════════════════════════════════════════════════
// GAME LOOP
// ═══════════════════════════════════════════════════════
function startGame(){
  document.getElementById('startscr').style.display='none';
  resize();buildShopUI();setupEvents();
  gameRunning=true;lastTs=performance.now();_lastFrameTs=performance.now();
  requestAnimationFrame(loop);
}

function loop(ts){
  if(!gameRunning)return;
  // Frame cap: skip render/update if too soon
  if(frameCap>0&&ts-_lastFrameTs<frameCap){requestAnimationFrame(loop);return;}
  const elapsed=Math.max(1,ts-_lastFrameTs);
  _lastFrameTs=ts;
  // FPS tracking
  _frameTm=elapsed;
  _fpsArr.push(elapsed);
  if(_fpsArr.length>60)_fpsArr.shift();
  _fpsTm+=elapsed;
  if(_fpsTm>=500){
    const avg=_fpsArr.reduce((a,b)=>a+b,0)/_fpsArr.length;
    _fpsDisplay=avg>0?Math.round(1000/avg).toString():'--';
    _fpsTm=0;
    if(showPing){
      const lag=Math.round(elapsed-1000/Math.max(1,parseFloat(_fpsDisplay)));
      const bar=document.getElementById('perfBar');
      if(bar){bar.style.display='block';bar.textContent=`FPS: ${_fpsDisplay} | Frame: ${Math.round(elapsed)}ms | Lag: ${Math.max(0,lag)}ms`;}
    }
  }
  const dt=Math.min(elapsed,50)*gameSpeed;
  lastTs=ts;
  update(dt);render();
  requestAnimationFrame(loop);
}

// ═══════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════
function d2(ax,ay,bx,by){const dx=ax-bx,dy=ay-by;return dx*dx+dy*dy;}
function spawnPart(x,y,col){
  if(visualMode==='none')return;
  const maxP=visualMode==='low'?40:200;
  if(parts.length>=maxP)return;
  const cnt=visualMode==='low'?3:7;
  for(let i=0;i<cnt;i++){const a=Math.random()*Math.PI*2;parts.push({x,y,vx:Math.cos(a)*(2+Math.random()*3),vy:Math.sin(a)*(2+Math.random()*3),col,life:400+Math.random()*400,maxLife:800,r:2+Math.random()*3});}
}
function showFlt(x,y,text,color){const el=document.createElement('div');el.className='flt';el.textContent=text;el.style.color=color;el.style.left=x+'px';el.style.top=y+'px';document.getElementById('mapwrap').appendChild(el);setTimeout(()=>el.remove(),920);}
function getDisc(){return towers.reduce((a,t)=>a+(t.globalDisc?t.discAmt||.05:0),0);}

// ═══════════════════════════════════════════════════════
// UPDATE
// ═══════════════════════════════════════════════════════
function update(dt){
  // Spawn
  if(waveActive&&spawnI<spawnQ.length){spawnTm+=dt;while(spawnI<spawnQ.length&&spawnTm>=spawnQ[spawnI].delay){spawnBloon(spawnQ[spawnI]);spawnI++;}}
  // Wave end
  if(waveActive&&spawnI>=spawnQ.length&&bloons.length===0){
    waveActive=false;const bonus=100+waveNum*10;money+=bonus;
    showFlt(W*.5,H*.38,`Wave ${waveNum} Complete! +$${bonus}`,'#f5c542');updUI();
    towers.filter(t=>t.tradeEmpire).forEach(()=>{money+=200;updUI();});
    let cd=3;const btn=document.getElementById('sendbtn');
    btn.disabled=true;btn.textContent=`⏳ Next in ${cd}s`;
    const tick=setInterval(()=>{cd--;if(cd<=0){clearInterval(tick);btn.textContent='⚡ Send Wave';btn.disabled=false;sendWave();}else btn.textContent=`⏳ Next in ${cd}s`;},1000);
  }
  // Cave Painting/Ancient Wisdom buffs
  const cpT=towers.filter(t=>t.cavePainting||t.ancientWisdom);
  towers.forEach(t=>{t._cpBuff=0;t._awBuff=0;cpT.forEach(c=>{if(c!==t&&d2(t.x,t.y,c.x,c.y)<c.range*c.range){if(c.cavePainting)t._cpBuff+=5;if(c.ancientWisdom)t._awBuff+=.25;}});});
  // Disabled timers for towers
  towers.forEach(t=>{if(t.disabledTimer>0)t.disabledTimer-=dt;});
  // Move bloons
  for(const b of bloons){
    if(b.disabledTimer>0){b.disabledTimer-=dt;continue;}
    // Stun: bloon can't move but STILL takes burn/DoT damage
    if(b.stunTimer>0){
      b.stunTimer-=dt;
      if(b.burnTimer>0){b.burnTimer-=dt;b.hp-=b.burnDps*(dt/1000);}
      if(b.hp<=0){b.dead=true;let r=b.reward;if(b.def.isMoab&&towers.some(t=>t.pirateLord))r*=2;money+=r;updUI();spawnPart(b.x,b.y,b.def.col);onBloonDeath(b);}
      continue;
    }
    if(b.frozen){b.frozenTimer-=dt;if(b.frozenTimer<=0)b.frozen=false;
      // Frozen bloons also still take burn
      if(b.burnTimer>0){b.burnTimer-=dt;b.hp-=b.burnDps*(dt/1000);}
      if(b.hp<=0){b.dead=true;let r=b.reward;if(b.def.isMoab&&towers.some(t=>t.pirateLord))r*=2;money+=r;updUI();spawnPart(b.x,b.y,b.def.col);onBloonDeath(b);}
      continue;
    }
    let spd=b.speed*(b.glued?Math.max(.01,1-(b.slowAmt||.5)):1);
    if(b.permafrost&&b.wasGlued)spd*=.82;
    if(b.sabotaged)spd*=.5;
    if(b.def.isODDT&&!b._phase2&&b.hp<b.maxHp*.5){b._phase2=true;b.speed*=1.33;b._dmgMult=1.33;}
    b.dist+=spd*dt*.06;
    if(b.burnTimer>0){b.burnTimer-=dt;b.hp-=b.burnDps*(dt/1000);}
    if(b.glued){b.glueTimer-=dt;if(b.glueTimer<=0)b.glued=false;}
    const pos=pathPos(b.dist);b.x=pos.x;b.y=pos.y;
    if(pos.done){
      b.dead=true;
      const dmg=Math.max(1,Math.ceil(b.def.hp/10));
      // Vengeance tracking for Orbital Monkey
      towers.filter(t=>t.vengefulSingularity).forEach(t=>{
        if(!t._vengeance)t._vengeance={};
        t._vengeance[b.def.id]=(t._vengeance[b.def.id]||0)+dmg;
      });
      loseLife(dmg);
      if(permLives<=0){gameOver();return;}
      document.getElementById('tbl').textContent=Math.max(0,lives);
    }
    if(b.hp<=0){b.dead=true;let r=b.reward;if(b.def.isMoab&&towers.some(t=>t.pirateLord))r*=2;money+=r;updUI();spawnPart(b.x,b.y,b.def.col);onBloonDeath(b);}
  }
  bloons=bloons.filter(b=>!b.dead);
  // Special blimp behaviors
  updateSpecialBlimps(dt);
  // Wall of fire / spirit forest
  towers.filter(t=>t.wallFire||t.spiritForest).forEach(t=>{t._wfTm=(t._wfTm||0)-dt;if(t._wfTm<=0){t._wfTm=500;bloons.filter(b=>d2(b.x,b.y,t.x,t.y)<t.range*t.range).forEach(b=>{b.hp-=(t.wallFireDmg||30)*.01*dt;if(t.spiritForest)b.hp-=20*.01*dt;});}});
  // Planes
  planes=planes.filter(p=>p.life>0);
  planes.forEach(p=>{p.life-=dt;p.angle+=dt*.003;const r=60+p.orbit;p.x=p.ox+Math.cos(p.angle)*r;p.y=p.oy+Math.sin(p.angle)*r;p.atkTm=(p.atkTm||0)-dt;if(p.atkTm<=0){p.atkTm=800;bloons.filter(b=>d2(b.x,b.y,p.x,p.y)<2500).slice(0,1).forEach(b=>dealDmg(b,p.dmg,p.tower));}});
  // Caltrops/energizer/bloontonium
  towers.filter(t=>t.caltrops).forEach(t=>{t._caltTm=(t._caltTm||0)-dt;if(t._caltTm<=0){t._caltTm=3000;bloons.filter(b=>d2(b.x,b.y,t.x,t.y)<t.range*t.range).forEach(b=>b.hp-=15);}});
  towers.filter(t=>t.energizer||t.bloontonium).forEach(t=>{t._enTm=(t._enTm||0)-dt;if(t._enTm<=0){t._enTm=500;bloons.filter(b=>d2(b.x,b.y,t.x,t.y)<t.range*t.range).forEach(b=>b.hp-=(t.energizerDmg||30)*(dt/1000)*10);}if(t.bloontonium)bloons.forEach(b=>{if(b.def.camo)b.revealed=true;});});
  towers.filter(t=>t.shimmer).forEach(t=>bloons.filter(b=>b.def.camo&&d2(b.x,b.y,t.x,t.y)<t.range*t.range).forEach(b=>b.revealed=true));
  towers.filter(t=>t.crowsNest||t.flagship).forEach(()=>bloons.forEach(b=>b.revealed=true));
  towers.filter(t=>t.subCmd).forEach(t=>towers.filter(tt=>tt.type==='sub'&&tt!==t&&d2(tt.x,tt.y,t.x,t.y)<t.range*t.range).forEach(tt=>tt._subCmdBuff=true));
  towers.filter(t=>t.type==='sub'&&!t.subCmd).forEach(t=>t._subCmdBuff=false);
  towers.filter(t=>t.preemptive).forEach(t=>bloons.filter(b=>b.def.isMoab&&!b._preHit).forEach(b=>{b._preHit=true;setTimeout(()=>dealDmg(b,500,t),500);}));

  // ── CURSED VITALITY SYSTEM ──
  // Expire old CV
  const now=Date.now();
  cv=cv.filter(c=>c.expiresAt>now);
  // Recalculate effective lives (permLives + active CV)
  {const totalLives=permLives+cvTotal();if(totalLives!==lives){lives=Math.max(0,totalLives);document.getElementById('tbl').textContent=lives;}}
  // Sacrificial Rite active drain
  if(sacrificialRiteActive){
    sacRiteTm-=dt;
    if(sacRiteTm<=0){sacrificialRiteActive=false;towers.filter(t=>t._sacRiteActive).forEach(t=>t._sacRiteActive=false);showFlt(W*.5,H*.3,'Sacrificial Rite ended','#cc0044');}
    else{// drain 1 perm HP/s
      sacRiteDrainAcc=(sacRiteDrainAcc||0)+dt;
      if(sacRiteDrainAcc>=1000){sacRiteDrainAcc-=1000;permLives=Math.max(1,permLives-1);}}
  }

  // ── CURSED MONKEY ──
  towers.filter(t=>t.isCursed&&t.disabledTimer<=0).forEach(t=>{
    // Pure Adapt: track all phenomena at once
    if(t.pureAdapt){t._adaptedTo='all';}
    // Insta-Drain on enter
    if(t.instaDrain){
      bloons.filter(b=>d2(b.x,b.y,t.x,t.y)<t.range*t.range&&!b._instaDrained).forEach(b=>{
        const hasPhen=b.def.camo||b.def.isLead||b.def.isArmored||b.def.isMoab;
        if(hasPhen){
          b.hp-=b.def.isMoab?b.maxHp*.03:b.maxHp*.08;
          b._instaDrained=true; // flag resets when out of range
        }
      });
      bloons.filter(b=>d2(b.x,b.y,t.x,t.y)>=t.range*t.range).forEach(b=>b._instaDrained=false);
    }
    // Shared Burden: buff nearby towers' attack speed (applied via _awBuff reuse)
    if(t.sharedBurden&&t.disabledTimer<=0){
      towers.filter(tt=>tt!==t&&d2(tt.x,tt.y,t.x,t.y)<t.range*t.range).forEach(tt=>tt._cursedSpeedBuff=true);
    }

    if(t.voodooLink){

          let dmg=t.dmg+(t._voodooCharge||0);t._voodooCharge=0;
          // Grand Ritualist dmg bonus
          if(t._gRitDmg)dmg+=t._gRitDmg;
          // Adaptation bonus vs adapted type
          if((t._adaptedTo&&(t._adaptedTo==='all'||tgt.def.camo||tgt.def.isLead||tgt.def.isArmored))||t.pureAdapt)dmg+=t.adaptBonus||0;
          // Fortified blimp bonus (Lane 3 T3)
          if(t.fortifiedBlimp&&tgt.def.isMoab&&tgt.def.isFort)dmg=Math.ceil(dmg*(1+t.fortifiedBlimp));
          // Blimp dmg bonus (Lane 3 T4)
          if(t.dualAdapt&&tgt.def.isMoab)dmg+=Math.ceil(dmg*.14);
          // Strip Camo (Lane 3 T2)
          if(t.adaptLead&&tgt.def.camo)tgt.revealed=true;
          // Adaptation lock (every 5th hit stun 0.1s)
          if(t.adaptLock){t._hitLockCount=(t._hitLockCount||0)+1;if(t._hitLockCount>=5){t._hitLockCount=0;tgt.stunTimer=(tgt.stunTimer||0)+100;}}
          dealDmg(tgt,dmg,t);
          if(t.doubleHit)setTimeout(()=>{if(!tgt.dead)dealDmg(tgt,dmg,t);},60);
          spawnPart(tgt.x,tgt.y,'#880022');
          // Camo Adaptation (detect → adapt)
          if(t.adaptation&&!t.pureAdapt){
            const camoBl=bloons.filter(b=>b.def.camo&&d2(b.x,b.y,t.x,t.y)<(t.adaptRange||t.range*2)*(t.adaptRange||t.range*2))[0];
            if(camoBl&&t._adaptedTo!=='camo'){t._adaptedTo='camo';t._adaptExpiry=Date.now()+8000;showFlt(t.x,t.y-28,'👁 Adapted: Camo','#cc0044');}
          }
          // Expire adaptations
          if(t._adaptedTo&&Date.now()>t._adaptExpiry&&!t.pureAdapt){t._adaptedTo=null;}
          if(t._adaptedTo2&&Date.now()>t._adaptExpiry2&&!t.pureAdapt){t._adaptedTo2=null;}
        }
      }
      continue;
    }
    if(t.disabledTimer>0)continue;
    let ecd=t.cd;
    if(t._awBuff>0)ecd=Math.max(50,Math.round(ecd*(1-t._awBuff)));
    if(t._cursedSpeedBuff)ecd=Math.max(50,Math.round(ecd*.9));// Cursed Monkey Shared Burden
    if(t.grandRitualist&&cvTotal()>0&&d2(t.x,t.y,towers.find(tt=>tt.grandRitualist)?.x||0,towers.find(tt=>tt.grandRitualist)?.y||0)<towers.find(tt=>tt.grandRitualist)?.range**2)ecd=Math.max(30,Math.round(ecd*.8));// Life Link
    if(t.aaActive&&t.hasTurbo)ecd=Math.max(50,t.cd-800);
    if(t.permaCharge)ecd=Math.max(50,t.cd-800);
    if(t.aaActive&&t.hasEvolution)ecd=Math.max(50,Math.round(t.cd*.3));
    if(t.eliteDef)ecd=Math.max(30,Math.round(t.cd*(1-(150-lives)/150*.5)));
    if(t._paidAtkBoost>0){ecd=Math.round(ecd*.5);t._paidAtkBoost-=dt;}
    if(sacrificialRiteActive){ecd=Math.max(30,Math.round(ecd*.8));} // Universal popping applied in dealDmg check
    t._atkTm=(t._atkTm||0)-dt;
    if(t._atkTm<=0){const tgt=getTarget(t);if(tgt){t._atkTm=ecd;shoot(t,tgt);if(t.doubleSwing)setTimeout(()=>{const t2=getTarget(t);if(t2)shoot(t,t2);},50);}}
  }

  // Projectiles
  for(const p of projs){
    if(p.dead)continue;
    if(p.type==='ice'){p.timer-=dt;if(p.timer<=0){p.dead=true;doIceAoe(p);}continue;}
    if(p.type==='glue'){p.timer-=dt;if(p.timer<=0){p.dead=true;doGlueHit(p);}const pos=pathPos(p.pDist);p.x=pos.x;p.y=pos.y;p.pDist+=p.pSpd*dt*.06;continue;}
    if(p.type==='sniper'){p.dead=true;const b=bloons.find(b=>b.id===p.tid);if(b)hitBloon(p,b);continue;}
    let tgt=bloons.find(b=>b.id===p.tid);
    if(p.seeking||p.nailZap){const cl=bloons.filter(b=>!p.hitSet.has(b.id)).sort((a,b2)=>d2(p.x,p.y,a.x,a.y)-d2(p.x,p.y,b2.x,b2.y))[0];if(cl){tgt=cl;p.tid=cl.id;}}
    if(!tgt){p.dead=true;continue;}
    const dx=tgt.x-p.x,dy=tgt.y-p.y,dd=Math.sqrt(dx*dx+dy*dy);
    if(dd<10){hitBloon(p,tgt);continue;}
    p.x+=dx/dd*(p.spd||5)*gameSpeed;p.y+=dy/dd*(p.spd||5)*gameSpeed;
  }
  projs=projs.filter(p=>!p.dead);
  // Performance: hard-cap projectile array to prevent memory spiral
  if(visualMode==='low'&&projs.length>500)projs=projs.slice(-500);
  else if(visualMode==='none'&&projs.length>800)projs=projs.slice(-800);
  parts.forEach(p=>{p.life-=dt;p.x+=p.vx*dt*.05;p.y+=p.vy*dt*.05;p.vy+=.008*dt;});
  parts=parts.filter(p=>p.life>0);
}

// ═══════════════════════════════════════════════════════
// SPECIAL BLIMPS
// ═══════════════════════════════════════════════════════
function updateSpecialBlimps(dt){
  bloons.filter(b=>b.def.isMoab).forEach(b=>{
    b._spTm=(b._spTm||0)-dt;
    const def=b.def;
    // AIRSHIP: bombard path bloons → Cherry
    if(def.isAirship&&b._spTm<=0){
      b._spTm=3000;
      bloons.filter(b2=>b2!==b&&!b2.def.isMoab&&d2(b2.x,b2.y,b.x,b.y)<6000).slice(0,5).forEach(b2=>{
        if(!b2.def.magicImmune){b2.def={...b2.def,magicImmune:true,deathStun:true};spawnPart(b2.x,b2.y,'#ff4499');}
      });
    }
    // DOOMSHIP: every 5s fire 3 missiles → disable towers 1.75s
    if(def.isDoomship&&b._spTm<=0){
      b._spTm=5000;
      const tgts=towers.filter(t=>!t.isAce&&!t.isHeli).sort(()=>Math.random()-.5).slice(0,3);
      tgts.forEach(t=>{
        // Misery Absorb: if a Cursed Monkey with miseryAbsorb is nearby, it takes the stun instead
        const absorber=towers.find(cm=>cm.isCursed&&cm.miseryAbsorb&&cm.disabledTimer<=0&&d2(cm.x,cm.y,t.x,t.y)<cm.range*cm.range);
        const disAmt=brainDrainActive?Math.round(1750*.6):1750;
        if(absorber){absorber.disabledTimer=(absorber.disabledTimer||0)+disAmt;showFlt(absorber.x,absorber.y-28,'✝ ABSORBED!','#cc0044');}
        else{t.disabledTimer=(t.disabledTimer||0)+disAmt;showFlt(t.x,t.y-28,'⚡ DISABLED!','#f55');}
      });
      spawnPart(b.x,b.y,'#aa0000');
    }
    // DOOMCARRIER: spawn Doom bloon every 1s
    if(def.isDoomcarrier&&b._spTm<=0){
      b._spTm=1000;
      spawnAt(getBT('doom'),b.dist-8,Math.round(getBT('doom').hp*(1+waveNum*.12)));
    }
    // OBSIDIANITE: bombard nearby + summon Obsidian every 0.66s; magic immune
    if(def.isObsidianite){
      b._spTm2=(b._spTm2||0)-dt;
      if(b._spTm<=0){
        b._spTm=2200;
        bloons.filter(b2=>b2!==b&&d2(b2.x,b2.y,b.x,b.y)<4000).forEach(b2=>dealDmg(b2,35,null));
        towers.filter(t=>d2(t.x,t.y,b.x,b.y)<3500).forEach(t=>t.disabledTimer=(t.disabledTimer||0)+400);
      }
      if(b._spTm2<=0){b._spTm2=660;spawnAt(getBT('obsidian'),b.dist-6,Math.round(getBT('obsidian').hp*(1+waveNum*.12)));}
    }
    // MOTHERDOOM phases
    if(def.isMotherdoom)updateMotherdoom(b,dt);
  });
}

function updateMotherdoom(b,dt){
  // Global missile every 10s
  b._missileTm=(b._missileTm||0)-dt;
  if(b._missileTm<=0){
    b._missileTm=10000;
    const st=[...towers].sort((a,b2)=>(b2.totalSpent||0)-(a.totalSpent||0))[0];
    if(st){st.disabledTimer=(st.disabledTimer||0)+2500;towers.filter(t=>t!==st&&d2(t.x,t.y,st.x,st.y)<6000).forEach(t=>t.disabledTimer=(t.disabledTimer||0)+1000);showFlt(st.x,st.y-28,'💥 MOTHERDOOM MISSILE!','#f00');}
  }
  // Summon every 15s
  b._summonTm=(b._summonTm||0)-dt;
  if(b._summonTm<=0){b._summonTm=15000;spawnAt(getBT('doomship'),b.dist-20,Math.round(getBT('doomship').hp*(1+waveNum*.12)));for(let i=0;i<3;i++)spawnAt(getBT('doom'),b.dist-10-i*6,Math.round(getBT('doom').hp*(1+waveNum*.12)));}
  // Phase 2: tower attack tracking
  if(b.phase===2){towers.forEach(t=>{if(d2(t.x,t.y,b.x,b.y)<t.range*t.range&&!t.isSupport){t._mdAtk=(t._mdAtk||0)+dt;if(t._mdAtk>=10000){t.disabledTimer=(t.disabledTimer||0)+1000;t._mdAtk=0;}}});}
  // Phase 3: transform aura every 2s
  if(b.phase===3){b._transT=(b._transT||0)-dt;if(b._transT<=0){b._transT=2000;bloons.forEach(bl=>{if(['rainbow','lead','ceramic'].includes(bl.def.id))bl.def=getBT('doom');if(['moab','doomab'].includes(bl.def.id))bl.def=getBT('doomab');});}}
  // Phase transitions
  const hpPct=b.hp/b.maxHp;
  if(!b.phase)b.phase=1;
  if(b.phase===1&&hpPct<.66){
    b.phase=2;b.hp=b.maxHp*.66;
    spawnAt(getBT('doomship'),b.dist-30,Math.round(getBT('doomship').hp*(1+waveNum*.12)));
    for(let i=0;i<5;i++)spawnAt(getBT('doom'),b.dist-12-i*7,Math.round(getBT('doom').hp*(1+waveNum*.12)));
    showFlt(W*.5,H*.42,'⚠️ MOTHERDOOM PHASE 2!','#f00');
  }
  if(b.phase===2&&hpPct<.33){
    b.phase=3;
    for(let i=0;i<3;i++)spawnAt(getBT('airship'),b.dist-20-i*12,Math.round(getBT('airship').hp*(1+waveNum*.12)));
    // Spikes in 8 directions disable 2 random towers
    towers.filter(t=>!t.isAce&&!t.isHeli).sort(()=>Math.random()-.5).slice(0,2).forEach(t=>t.disabledTimer=(t.disabledTimer||0)+1500);
    showFlt(W*.5,H*.42,'💀 MOTHERDOOM DOOM CORE!','#f00');
  }
}

function onBloonDeath(b){
  const sc=1+waveNum*.12;
  if(b.def.isAirship){for(let i=0;i<2;i++)spawnAt(getBT('moab'),b.dist-i*15,Math.round(200*sc));for(let i=0;i<4;i++)spawnAt(getBT('cherry'),b.dist-4-i*8,Math.round(12*sc));}
  if(b.def.isDoomcarrier){for(let i=0;i<2;i++)spawnAt(getBT('doomab'),b.dist-i*18,Math.round(650*sc));for(let i=0;i<3;i++)spawnAt(getBT('doom'),b.dist-6-i*9,Math.round(55*sc));}
  if(b.def.isObsidianite){for(let i=0;i<2;i++)spawnAt(getBT('oddt'),b.dist-i*22,Math.round(800*sc));}
  if(b.def.isODDT){for(let i=0;i<5;i++)spawnAt(getBT('obsidian'),b.dist-i*7,Math.round(80*sc));}
  if(b.def.deathStun)bloons.filter(b2=>d2(b2.x,b2.y,b.x,b.y)<2000).forEach(b2=>b2.stunTimer=(b2.stunTimer||0)+1500);
}

function spawnAt(def,dist,hp){
  if(!def)return;
  dist=Math.max(0,dist);
  const pos=pathPos(dist);
  bloons.push({id:nid++,def,x:pos.x,y:pos.y,dist,hp,maxHp:hp,speed:def.spd*(1+waveNum*.025),reward:def.reward,dead:false,frozen:false,frozenTimer:0,glued:false,slowAmt:0,glueTimer:0,burnDps:0,burnTimer:0,stunTimer:0,embrittled:false,revealed:false,permafrost:false,wasGlued:false,superBrittled:false,sabotaged:false,disabledTimer:0,camo:def.camo,isMoab:def.isMoab,_spTm:0,_spTm2:0});
}

// ═══════════════════════════════════════════════════════
// TARGETING & SHOOTING
// ═══════════════════════════════════════════════════════
function getTarget(t){
  const rx=t.isAce?(t._rx||t.x):t.isHeli?(t.heliX||t.x):t.x;
  const ry=t.isAce?(t._ry||t.y):t.isHeli?(t.heliY||t.y):t.y;
  const r2=t.range<9000?t.range*t.range:Infinity;
  let best=null,bestDist=-Infinity;
  for(const b of bloons){
    if(b.def.magicImmune&&['wizard','weaver'].includes(t.type))continue;
    if(b.def.camo&&!t.camoDet&&!b.revealed)continue;
    if(b.def.isDdt&&!t.hitLead)continue;
    if((b.def.isLead||b.def.isArmored)&&!t.hitLead&&!t.ignoreArmor&&['dart','boomerang','tack','ninja'].includes(t.type))continue;
    if(r2<Infinity&&d2(b.x,b.y,rx,ry)>=r2)continue;
    if(b.dist>bestDist){best=b;bestDist=b.dist;}
  }
  return best;
}

function shoot(t,tgt){
  if(t.type==='tack'){fireTacks(t);return;}
  if(t.type==='ice'){projs.push({id:nid++,x:t.x,y:t.y,type:'ice',timer:50,tower:t,dead:false});return;}
  if(t.type==='glue'){projs.push({id:nid++,x:tgt.x,y:tgt.y,type:'glue',timer:80,tower:t,tid:tgt.id,pDist:tgt.dist,pSpd:3,dead:false});return;}
  if(t.type==='sniper'){projs.push({id:nid++,x:t.x,y:t.y,type:'sniper',tid:tgt.id,dmg:t.dmg+(t._cpBuff||0)+(tgt.def.isMoab&&t.moabIce?t.moabIce:0),pierce:1,hits:1,tower:t,dead:false,hitSet:new Set()});return;}
  if(t.type==='pirate'){
    for(let i=0;i<Math.min(t.dartCount||3,bloons.length);i++){const b2=bloons.sort((a,b3)=>b3.dist-a.dist)[i]||tgt;projs.push({id:nid++,x:t.x,y:t.y,type:'pirate',tid:b2.id,dmg:t.dmg+(t._cpBuff||0),pierce:t.pierce,hits:t.pierce,tower:t,dead:false,hitSet:new Set(),spd:5});}
    if(t.cannon){const cl=bloons.sort((a,b2)=>b2.dist-a.dist)[0];if(cl)dealDmg(cl,t.cannonDmg||40,t);}
    if(t.grapeshot)bloons.filter(b=>d2(b.x,b.y,t.x,t.y)<t.range*t.range).slice(0,5).forEach(b=>{dealDmg(b,10,t);b.burnDps=15;b.burnTimer=2000;});
    return;
  }
  if(t.type==='caveman'){bloons.filter(b=>d2(b.x,b.y,t.x,t.y)<(t.earthquake?t.range*2:t.range)*(t.earthquake?t.range*2:t.range)).slice(0,t.pierce+(t.earthquake?999:0)).forEach(b=>{let dm=(t.dmg+(t._cpBuff||0))*(t.aaActive&&t.hasEvolution?3:1);if(b.def.isMoab&&t.moabDmg)dm+=t.moabDmg;dealDmg(b,dm,t);if(t.bigBonk)b.stunTimer=1000;});return;}
  if(t.type==='ninja'){
    const cnt=t.shurikenCount||1;
    const tgts=[tgt,...bloons.filter(b=>b!==tgt&&d2(b.x,b.y,t.x,t.y)<t.range*t.range).sort((a,b2)=>b2.dist-a.dist).slice(0,cnt-1)];
    tgts.slice(0,cnt).forEach(b2=>{const p={id:nid++,x:t.x,y:t.y,type:'ninja',tid:b2.id,dmg:t.dmg+(t._cpBuff||0),pierce:t.pierce,hits:t.pierce,tower:t,dead:false,hitSet:new Set(),seeking:t.shurikenSeek,spd:5};if(t.flashBombs){p.flashBomb=true;p.flashBombDmg=t.flashBombDmg||20;}if(t.stickyBomb||t.masterBomber){p.stickyBomb=true;p.sbDmg=t.masterBomber?1000:200;}projs.push(p);});
    return;
  }
  if(t.type==='wizard'){const p={id:nid++,x:t.x,y:t.y,type:'wizard',tid:tgt.id,dmg:t.dmg+(t._cpBuff||0)+(tgt.def.isMoab&&t.moabArcane?t.moabArcane:0),pierce:t.pierce,hits:t.pierce,tower:t,dead:false,hitSet:new Set(),seeking:t.seeking,spd:5};if(t.masterMagic)p.aoe=true;projs.push(p);if(t.dragonBreath)bloons.filter(b=>d2(b.x,b.y,t.x,t.y)<t.range*t.range).slice(0,3).forEach(b=>{b.burnDps=40;b.burnTimer=1500;});return;}
  if(t.type==='ace'){const sx=t._rx||t.x,sy=t._ry||t.y;const cnt=Math.min(t.dartCount||8,t.flyFortress?6:3);for(let i=0;i<cnt;i++){const b2=bloons.sort((a,b3)=>b3.dist-a.dist)[i]||tgt;let dm=t.dmg+(t._cpBuff||0);if(t.cmdSkies&&(b2.def.id==='zomg'||b2.def.id==='bad'))dm*=3;projs.push({id:nid++,x:sx,y:sy,type:'ace',tid:b2.id,dmg:dm,pierce:t.pierce,hits:t.pierce,tower:t,dead:false,hitSet:new Set(),spd:5,dartMoney:t.dartMoney||0});}return;}
  if(t.type==='heli'){const sx=t.heliX||t.x,sy=t.heliY||t.y;for(let i=0;i<(t.dartCount||2);i++){const b2=bloons.sort((a,b3)=>b3.dist-a.dist)[i]||tgt;let dm=t.dmg+(t._cpBuff||0);if(t.cmdSkies&&(b2.def.id==='zomg'||b2.def.id==='bad'))dm*=3;projs.push({id:nid++,x:sx,y:sy,type:'heli',tid:b2.id,dmg:dm,pierce:t.pierce,hits:t.pierce,tower:t,dead:false,hitSet:new Set(),spd:5});}return;}
  if(t.type==='sub'){
    const cnt=t.tripleThreat?24:t.dartCount||2;
    const all=bloons.filter(b=>(!b.def.camo||t.camoDet||b.revealed)&&d2(b.x,b.y,t.x,t.y)<t.range*t.range).sort((a,b2)=>b2.dist-a.dist);
    for(let i=0;i<Math.min(cnt,all.length);i++){const b2=all[i%all.length];let dm=(t.dmg+(t._cpBuff||0))*(t._subCmdBuff?1.5:1);if((b2.def.isLead||b2.def.isArmored)&&t.armorDmg)dm+=t.armorDmg;projs.push({id:nid++,x:t.x,y:t.y,type:'sub',tid:b2.id,dmg:dm,pierce:t.pierce,hits:t.pierce,tower:t,dead:false,hitSet:new Set(),spd:5});}
    if(t.subMissile){const m2=bloons.filter(b=>b.def.isMoab&&d2(b.x,b.y,t.x,t.y)<(t.range*1.5)*(t.range*1.5))[0];if(m2){let dm=t.missileDmg||50;if(t.moabMissile)dm+=t.moabMissile;dealDmg(m2,dm,t);spawnPart(m2.x,m2.y,'#f5a623');}}
    return;
  }
  const cnt=t.triShot||1;
  const tgts=[tgt,...bloons.filter(b=>b!==tgt&&d2(b.x,b.y,t.x,t.y)<t.range*t.range).sort((a,b2)=>b2.dist-a.dist).slice(0,cnt-1)];
  tgts.slice(0,cnt).forEach(b2=>projs.push({id:nid++,x:t.x,y:t.y,type:t.type,tid:b2.id,dmg:t.dmg+(t._cpBuff||0)+(b2.def.isMoab?t.moabDmg||0:0),pierce:t.pierce,hits:t.pierce,tower:t,dead:false,hitSet:new Set(),spd:5}));
}

function fireTacks(t){bloons.filter(b=>d2(b.x,b.y,t.x,t.y)<t.range*t.range).slice(0,t.tacks||8).forEach(b=>{dealDmg(b,t.dmg+(t._cpBuff||0),t);if(t.burnTack){b.burnDps=10;b.burnTimer=2000;}});}
function doIceAoe(p){const t=p.tower;bloons.filter(b=>d2(b.x,b.y,t.x,t.y)<t.range*t.range).forEach(b=>{if(b.def.isMoab&&!t.absoluteZero)return;if((b.def.id==='white'||b.def.id==='zebra')&&!t.hitLead)return;dealDmg(b,t.dmg+(t.frozenDmg||0),t);b.frozen=true;b.frozenTimer=t.absoluteZero?15000:3000;if(t.permafrost)b.permafrost=true;if(t.embrittlement){b.revealed=true;b.embrittled=true;}if(t.superBrittle)b.superBrittled=true;if(t.iceShards)bloons.filter(b2=>b2!==b&&d2(b2.x,b2.y,b.x,b.y)<1600).forEach(b2=>dealDmg(b2,(t.dmg||15)*.5,t));});}
function doGlueHit(p){const t=p.tower;bloons.filter(b=>d2(b.x,b.y,p.x,p.y)<(30+t.pierce*5)*(30+t.pierce*5)).slice(0,t.pierce).forEach(b=>{if(b.def.isMoab&&!t.moabGlue)return;b.glued=true;b.slowAmt=t.slowAmt||.5;b.glueTimer=t.slowDur||3000;b.wasGlued=true;if(t.glueDps){b.burnDps=(b.burnDps||0)+t.glueDps;b.burnTimer=t.slowDur||3000;}if(t.superGlue)b.stunTimer=2000;});}

function hitBloon(p,b){
  if(p.hitSet.has(b.id))return;p.hitSet.add(b.id);
  let dm=p.dmg*(b.embrittled?1.5:1)*(b.superBrittled?2:1)*(b._dmgMult||1);
  dealDmg(b,dm,p.tower);
  if(p.tower?.moabStun&&b.def.isMoab)b.stunTimer=p.tower.moabStun;
  if(p.flashBomb)bloons.filter(b2=>d2(b2.x,b2.y,b.x,b.y)<1600).forEach(b2=>{b2.stunTimer=800;dealDmg(b2,p.flashBombDmg||20,p.tower);});
  if(p.stickyBomb&&b.def.isMoab)setTimeout(()=>{dealDmg(b,p.sbDmg||200,p.tower);if(p.tower?.masterBomber)bloons.filter(b2=>d2(b2.x,b2.y,b.x,b.y)<3600).forEach(b2=>{b2.stunTimer=2000;dealDmg(b2,(p.sbDmg||200)*.3,p.tower);});},1000);
  if(p.distraction&&Math.random()<.1)b.dist=Math.max(0,b.dist-50);
  if(p.tower?.shrapnel)bloons.filter(b2=>b2!==b&&d2(b2.x,b2.y,b.x,b.y)<2500).slice(0,5).forEach(b2=>dealDmg(b2,p.dmg*.3,p.tower));
  if(p.aoe)bloons.filter(b2=>b2!==b&&d2(b2.x,b2.y,b.x,b.y)<2500).forEach(b2=>dealDmg(b2,p.dmg,p.tower));
  if(p.nailZap)bloons.filter(b2=>b2!==b&&d2(b2.x,b2.y,b.x,b.y)<1600).forEach(b2=>dealDmg(b2,p.dmg*.4,p.tower));
  if(p.nailStrip&&b.def.isFort)b.def={...b.def,isFort:false};
  if(p.dartMoney){money+=p.dartMoney;updUI();}
  p.hits--;if(p.hits<=0)p.dead=true;
}

function dealDmg(b,dmg,tower){
  if(!b||b.dead)return;
  if(tower&&b.def.magicImmune&&['wizard','weaver'].includes(tower.type)&&!sacrificialRiteActive)return;
  // Sacrificial Rite: universal popping — bypass lead/armor restriction
  const universalPop=sacrificialRiteActive||(tower?.isCursed&&tower?.pureAdapt);
  if((b.def.isLead||b.def.isArmored)&&tower&&!tower.hitLead&&!tower.ignoreArmor&&!universalPop&&!['ice','wizard','sniper','sub'].includes(tower?.type))dmg=Math.ceil(dmg*.4);
  if(b.sabotaged)dmg*=1.2;
  // Shared Delusion: +2 dmg to bloons currently targeted by a hypno ally
  if(b._sharedDelBuff)dmg+=2;
  b.hp-=dmg;
  if(tower?.bonusKill&&b.hp<=0){money+=tower.bonusKill;updUI();}
}

function sentryBarrage(t,isPaid){
  bloons.forEach(b=>{const kf=t.solarAscendant?(b.def.id&&b.def.id.includes('zomg')?b.maxHp/10:b.maxHp/3):b.maxHp/3;b.hp-=kf;if(isPaid)b.stunTimer=200;if(t.solarAscendant){money+=(b.def.isMoab?70:30);updUI();if(b.hp<=0)lives=Math.min(200,lives+8);}});
  if(isPaid)towers.forEach(tt=>tt._paidAtkBoost=3000);
  for(let i=0;i<4;i++){const p2=pathPos(PL*(i+1)/5);spawnPart(p2.x,p2.y,'#f5c542');}
  showFlt(W*.5,H*.4,'☀️ SOLAR BARRAGE!','#f5c542');
}

function activateAA(t){

  else if(t.hasPhoenix||t.wizPhoenix){t.aaDur=t.wizPhoenix?20000:15000;planes.push({id:nid++,ox:t.x,oy:t.y,x:t.x,y:t.y,angle:0,orbit:0,dmg:t.wizPhoenix?100:60,tower:t,life:t.aaDur,atkTm:0});showFlt(t.x,t.y-28,'🔥 PHOENIX!','#f5a623');}
  else if(t.hasPrimalScream){t.aaDur=4000;bloons.forEach(b=>b.stunTimer=4000);showFlt(t.x,t.y-28,'😤 SCREAM!','#9b59b6');}
  else if(t.hasEvolution){t.aaDur=20000;t.aaDurMax=20000;showFlt(t.x,t.y-28,'🦍 EVOLUTION!','#2ecc71');}

  else if(t.hasThreadStorm||t.enhancedStorm){t.aaDur=t.enhancedStorm?6000:5000;t.aaDurMax=t.aaDur;showFlt(t.x,t.y-28,'⚡ THREAD STORM!','#d070ff');}
  else if(t.hasGroundZero||t.tsarBomba){const dm=t.tsarBomba?5000:2000;bloons.forEach(b=>{b.hp-=dm;if(t.tsarBomba)b.stunTimer=10000;});showFlt(W*.5,H*.4,t.tsarBomba?'💣 TSAR BOMBA!':'💥 GROUND ZERO!','#f5a623');t.aaActive=false;t.aaCd=getAACd(t);return;}
  else if(t.hasFirstStrike){const st=bloons.filter(b=>b.def.isMoab).sort((a,b2)=>b2.hp-a.hp)[0];if(st){st.hp-=1000;spawnPart(st.x,st.y,'#f5a623');}t.aaActive=false;t.aaCd=getAACd(t);return;}

  else if(t.chainBurst){const cnt=t.doomBombPassive?20:15;let cur=bloons.sort((a,b2)=>b2.dist-a.dist)[0];const hit=new Set();for(let i=0;i<cnt&&cur;i++){if(hit.has(cur.id))break;hit.add(cur.id);cur.hp=0;if(cur.def.isMoab&&cur.def.isFort)cur.def={...cur.def,isFort:false};if(i%5===4){const m2=bloons.filter(b=>b.def.isMoab)[0];if(m2){m2.hp-=t.doomBombPassive?m2.maxHp:200;spawnPart(m2.x,m2.y,'#ff4400');}}cur=bloons.filter(b=>!hit.has(b.id)&&d2(b.x,b.y,cur.x,cur.y)<4900)[0];}t.aaDur=5000;t.aaDurMax=5000;showFlt(t.x,t.y-28,'💥 CHAIN BURST!','#ff6600');}
}
function getAACd(t){if(t.hasGlueStorm||t.globalGlue)return 45000;if(t.hasMael)return 30000;if(t.hasSnowstorm||t.absoluteZero)return 30000;if(t.hasSupplyDrop)return 60000;if(t.hasTurbo)return 45000;if(t.hasHook)return 45000;if(t.pirateLord)return 60000;if(t.hasPhoenix)return 40000;if(t.hasPrimalScream)return 40000;if(t.hasEvolution)return 60000;if(t.hasBloonSab)return 45000;if(t.hasThreadStorm)return 10000;if(t.enhancedStorm)return 14000;if(t.hasGroundZero)return 60000;if(t.tsarBomba)return 80000;if(t.hasFirstStrike)return 45000;if(t.hasChinook)return 60000;if(t.chainBurst)return 30000;return 30000;}
